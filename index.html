<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<meta name="theme-color" content="#2A4634" />
<title>261 排勤務板</title>
<style>
  :root{--bg:#F1F3EE;--surface:#fff;--ink:#20261E;--sub:#6C7268;--line:#E3E5DC;--green:#3B6147;--green-deep:#2A4634;--green-soft:#E9EFE8;--brass:#A9793F;--brass-soft:#F5ECDB;--amber:#9A6B14;--amber-soft:#F7EFDB;--red:#B0453C;--red-soft:#F6E5E2;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
  body{font-family:system-ui,-apple-system,"Noto Sans TC","PingFang TC",sans-serif;color:var(--ink);}
  button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  input,textarea{font:inherit;}
  svg{display:block;}
  .wrap{max-width:600px;margin:0 auto;padding:16px 14px 96px;}
  .btn{transition:transform .12s ease,background .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .btn:active{transform:translateY(1px) scale(.985);}
  .tap:active{transform:scale(.96);}
  *:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
  .backdrop{position:fixed;inset:0;background:rgba(20,30,22,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .2s ease;}
  .sheet{width:100%;max-width:600px;background:var(--surface);border-radius:20px 20px 0 0;padding:0 14px 22px;box-shadow:0 -8px 30px rgba(0,0,0,.18);animation:slide .28s cubic-bezier(.2,.8,.2,1);}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--green-deep);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88vw;text-align:center;display:none;}
  .toast.show{display:block;animation:fade .25s ease;}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:saturate(1.1) blur(8px);border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;border:none;background:transparent;padding:11px 0 13px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11.5px;font-weight:700;color:var(--sub);}
  .nav button.on{color:var(--green-deep);}
  @keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<div id="overlay"></div>
<div id="toast" class="toast"></div>
<div id="nav" class="nav"></div>

<script>
"use strict";

var PEOPLE=[{id:1,code:"01",name:"李愷宸"},{id:2,code:"02",name:"江偉綸"},{id:3,code:"03",name:"陳柏翰"},{id:4,code:"04",name:"鄧旭辰"},{id:5,code:"05",name:"廖翊滕"},{id:6,code:"06",name:"陳俊穎"},{id:7,code:"07",name:"林柏宇"},{id:8,code:"08",name:"林崇浩"}];
var ORDER=[1,2,3,4,5,6,7,8];
var PERIODS=[{key:"AM",label:"上午",meal:"早"},{key:"NOON",label:"午",meal:"午"},{key:"PM",label:"晚",meal:"晚"}];
var GROUPS=[{key:"AM",label:"上午"},{key:"NOON",label:"午"},{key:"AFT",label:"下午"},{key:"PM",label:"晚"},{key:"GC",label:"公差"}];
var C={bg:"#F1F3EE",surface:"#fff",ink:"#20261E",sub:"#6C7268",line:"#E3E5DC",green:"#3B6147",greenDeep:"#2A4634",greenSoft:"#E9EFE8",brass:"#A9793F",brassSoft:"#F5ECDB",amber:"#9A6B14",amberSoft:"#F7EFDB",red:"#B0453C",redSoft:"#F6E5E2"};
var PAL=["#3B6147","#4E6E8E","#8E5A6E","#6E7D3D","#B06A3C","#4C7D74","#7A6BA8","#997A2E","#A65A5A","#5B8C6E","#54708A","#8A6D3B","#6B5B95","#3F7D6E","#A34E5E","#5F8C3A","#7E6248","#4670A0","#9C5B7C","#4A8577"];
var STORE_KEY="duty-board-v3";
/* 雲端同步網址：部署 Apps Script 後，把 /exec 網址貼到下面這一行（只需改這一行）。
   填好後全隊用同一份 index.html 就會自動連到同一份試算表，App 內不用再輸入網址。
   留空字串則沿用舊的「手動輸入網址」流程，不會壞。 */
var DEFAULT_SYNC_URL="";

var ICON={plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',minus:'<path d="M5 12h14"/>',x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',check:'<path d="M20 6 9 17l-5-5"/>',rotate:'<path d="M3 12a9 9 0 1 0 9-9 9.7 9.7 0 0 0-6.7 2.7L3 8"/><path d="M3 3v5h5"/>',copy:'<rect x="8" y="8" width="14" height="14" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',wand:'<path d="M4 20 14 10"/><path d="m17 3 1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/>',trash:'<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>',board:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>',chart:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',lock:'<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/>',clock:'<circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/>',pencil:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/>',eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>'};
function icon(n,s,c){s=s||18;c=c||"currentColor";return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICON[n]+'</svg>';}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function nameOf(id){return state.names[id];}
function personByCode(pid){for(var i=0;i<PEOPLE.length;i++)if(PEOPLE[i].id===pid)return PEOPLE[i];return null;}
function splitColon(line){var i=line.search(/[：:]/);if(i<0)return null;return {label:line.slice(0,i).trim(),colon:line[i],rhs:line.slice(i+1)};}
var GCOLORS={"打飯":"#C08743","公差":"#5479A6","打掃":"#4F8A6A","大公差":"#9C4A6E","小公差":"#6B5B95","站哨":"#3E7B8C","分菜":"#B06A3C"};
function deriveGroup(cat){if(cat==="大公差")return "大公差";if(cat==="小公差")return "小公差";if(/分菜/.test(cat))return "分菜";if(/(早打|午打|晚打)/.test(cat)||cat==="打飯")return "打飯";if(/公差|車場|鋁床|經理|保槍|安官|衛哨|哨/.test(cat))return "公差";return "打掃";}
function catColor(cat){var g=(typeof HIST!=="undefined"&&HIST.cg&&HIST.cg[cat])||deriveGroup(cat);return GCOLORS[g]||"#888";}
function sum(o){var s=0;for(var k in o)s+=o[k];return s;}
function todayLabel(){var d=new Date();return (d.getMonth()+1)+"/"+d.getDate();}
function curDate(){return extractDate(state.gongban.raw)||(state.schedule&&state.schedule.date)||todayLabel();}
function dnum(md){var m=(md||"").match(/(\d{1,2})\/(\d{1,2})/);return m?parseInt(m[1],10)*100+parseInt(m[2],10):0;}
function mdToDate(md){var m=(md||"").match(/(\d{1,2})\/(\d{1,2})/);if(!m)return null;return new Date(new Date().getFullYear(),parseInt(m[1],10)-1,parseInt(m[2],10));}
function dateToMD(d){return (d.getMonth()+1)+"/"+d.getDate();}
function addDaysMD(md,n){var d=mdToDate(md);if(!d)return md;d.setDate(d.getDate()+n);return dateToMD(d);}
function spanMin(str){str=(str||"").replace(/\s/g,"");if(!str)return null;var p=str.split(/[-~\u301c\uff5e\u2013]/);var s=toMin(p[0]);if(s==null)return null;var e=p[1]?toMin(p[1]):s;return [s,e];}
function fmtSpan(str){var p=(str||"").replace(/\s/g,"").split(/[-~\u301c\uff5e\u2013]/);return p[1]?(hmFmt(p[0])+"\u2013"+hmFmt(p[1])):hmFmt(p[0]);}
function absenceRec(pid,md){var v=state.absence[md]&&state.absence[md][pid];if(!v)return null;if(typeof v==="string")return {reason:v,range:""};return {reason:v.reason,range:v.range||(v.until?("0530-"+v.until):"")};}
function absentReason(pid,md){var r=absenceRec(pid,md);return r?r.reason:null;}
function fullDayOut(pid,md){var r=absenceRec(pid,md);return !!(r&&!r.range);}
function restRange(pid,md){var r=absenceRec(pid,md);return (r&&r.range)?r.range:"";}
function restBlock(pid,duty){var rec=absenceRec(pid,curDate());if(!rec||!rec.range)return null;var r=spanMin(rec.range),d=spanMin(duty.schedTime||duty.time||"");if(!r||!d)return null;return (d[0]<r[1]&&d[1]>r[0])?("補休 "+fmtSpan(rec.range)):null;}
function setAbsent(pid,md,rec){if(!state.absence[md])state.absence[md]={};state.absence[md][pid]=(typeof rec==="string")?{reason:rec,range:""}:rec;}
function clearAbsent(pid,md){if(state.absence[md]){delete state.absence[md][pid];if(!Object.keys(state.absence[md]).length)delete state.absence[md];}}
function personAbsences(pid){var out=[];for(var md in state.absence){var r=absenceRec(pid,md);if(r)out.push({md:md,reason:r.reason,range:r.range||"",k:dnum(md)});}out.sort(function(a,b){return a.k-b.k;});return out;}
function syncAvail(){var cd=curDate();PEOPLE.forEach(function(p){state.available[p.id]=!fullDayOut(p.id,cd);});}
function extractDate(t){var m=t.match(/(\d{1,2})\s*[\/月]\s*(\d{1,2})/);return m?(parseInt(m[1],10)+"/"+parseInt(m[2],10)):null;}
function pord(p){return p==="AM"?0:p==="NOON"?1:2;}

/* ---------- 狀態 ---------- */
function loadSaved(){try{var r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
var saved=loadSaved();
function migrateLog(s){
  if(!s)return [];
  if(s.log)return s.log;
  var entries=[];
  if(s.history){for(var id in s.history){var h=s.history[id];for(var cat in h){for(var i=0;i<h[cat];i++)entries.push({p:parseInt(id,10),c:cat});}}}
  else if(s.counts){for(var id2 in s.counts){for(var j=0;j<s.counts[id2];j++)entries.push({p:parseInt(id2,10),c:"先前紀錄"});}}
  return entries.length?[{id:1,date:"先前",entries:entries}]:[];
}
var state={
  names:(function(){var o={};PEOPLE.forEach(function(p){o[p.id]=p.name;});if(saved&&saved.names)for(var k in saved.names)o[k]=saved.names[k];return o;})(),
  log:migrateLog(saved),
  mealQueue:(function(){if(saved&&saved.mealQueue&&saved.mealQueue.length===8)return saved.mealQueue.slice();if(saved&&typeof saved.mealPtr==="number"){var p=((saved.mealPtr%8)+8)%8;return ORDER.slice(p).concat(ORDER.slice(0,p));}return ORDER.slice();})(),
  available:(function(){var o={};PEOPLE.forEach(function(p){o[p.id]=true;});return o;})(),
  gongban:{raw:"",meta:[],loaded:false},
  duties:[],
  guard:(saved&&saved.guard)?saved.guard:{raw:"",meta:[],days:[],loaded:false,committed:false},
  guardTally:(function(){var o={};PEOPLE.forEach(function(p){o[p.id]=0;});if(saved&&saved.guardTally)for(var k in saved.guardTally)o[k]=saved.guardTally[k];return o;})(),
  guardPaste:"",
  sheet:null,
  page:"board",
  showPaste:false,showPreview:false,
  addForm:{open:false,name:"",period:"AM",count:1,keepAll:false,extra:null,time:""},
  importOpen:false,confirmReset:false,backupOpen:false,showGuardPaste:false,
  syncUrl:(function(){if(DEFAULT_SYNC_URL&&/script\.google\.com/.test(DEFAULT_SYNC_URL))return DEFAULT_SYNC_URL;try{return localStorage.getItem("duty-sync-url")||"";}catch(e){return "";}})(),
  syncStatus:"",syncOpen:false,
  schedule:(function(){var d=saved&&saved.schedule;return (d&&d.items)?d:{raw:"",items:[],title:"",loaded:false,date:""};})(),
  schedPaste:"",showSchedPaste:false,
  plans:(saved&&saved.plans)?saved.plans:{},
  dayView:{mode:"A",date:""},
  absence:(saved&&saved.absence)?saved.absence:{},
  absForm:{reason:"補休",start:"",len:1,range:""},
  boards:(saved&&saved.boards)?saved.boards:{},
  activeDate:(saved&&saved.activeDate)?saved.activeDate:"",
  boardMode:"edit",boardOpen:false
};
(function(){var d=state.activeDate,b=d&&state.boards[d];if(b&&b.duties){state.gongban={raw:b.raw,meta:b.meta,loaded:true};state.duties=b.duties;if(b.schedule&&b.schedule.items)state.schedule=b.schedule;}else{state.activeDate="";}})();
var pasteText="",importText="",restoreText="",syncInput="";
function saveBoard(){if(!state.activeDate||!state.gongban.loaded)return;var prev=state.boards[state.activeDate];state.boards[state.activeDate]={raw:state.gongban.raw,meta:state.gongban.meta,duties:state.duties,schedule:state.schedule,committed:(prev&&prev.committed)||false,wd:(prev&&prev.wd)||""};}
function loadBoard(date){saveBoard();var b=state.boards[date];if(!b)return false;state.gongban={raw:b.raw,meta:b.meta,loaded:true};state.duties=b.duties;state.schedule=(b.schedule&&b.schedule.items)?b.schedule:{raw:"",items:[],title:"",loaded:false,date:""};state.activeDate=date;return true;}
function boardDates(){return Object.keys(state.boards).sort(function(a,b){return dnum(a)-dnum(b);});}
function persistLocal(){try{saveBoard();localStorage.setItem(STORE_KEY,JSON.stringify({names:state.names,log:state.log,mealQueue:state.mealQueue,guard:state.guard,guardTally:state.guardTally,schedule:state.schedule,plans:state.plans,absence:state.absence,boards:state.boards,activeDate:state.activeDate}));}catch(e){}}
function persist(){persistLocal();pushSync();}
var SYNC_KEY="duty-sync-url",pushT=null,lastPushAt=0,pollTimer=null;
function payload(){return JSON.stringify({names:state.names,log:state.log,mealQueue:state.mealQueue,guard:state.guard,guardTally:state.guardTally,plans:state.plans,absence:state.absence});}
function syncBadge(){var el=document.getElementById("syncdot");if(el)el.style.background=state.syncStatus==="on"?C.green:state.syncStatus==="err"?C.red:C.line;}
function pushSync(){
  if(!state.syncUrl)return;
  clearTimeout(pushT);
  pushT=setTimeout(function(){
    lastPushAt=Date.now();
    fetch(state.syncUrl,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:payload()}).then(function(){state.syncStatus="on";syncBadge();}).catch(function(){state.syncStatus="err";syncBadge();});
  },400);
}
function applyRemote(o){
  if(!o||!o.names)return false;
  var rem=JSON.stringify({names:o.names,log:o.log||[],mealQueue:(o.mealQueue&&o.mealQueue.length===8)?o.mealQueue:state.mealQueue,guard:o.guard||state.guard,guardTally:o.guardTally||state.guardTally,plans:o.plans||state.plans,absence:o.absence||state.absence});
  var cur=JSON.stringify({names:state.names,log:state.log,mealQueue:state.mealQueue,guard:state.guard,guardTally:state.guardTally,plans:state.plans,absence:state.absence});
  if(rem===cur)return false;
  state.names=o.names;if(o.log)state.log=o.log;if(o.mealQueue&&o.mealQueue.length===8)state.mealQueue=o.mealQueue;if(o.guard)state.guard=o.guard;if(o.guardTally)state.guardTally=o.guardTally;if(o.plans)state.plans=o.plans;if(o.absence)state.absence=o.absence;
  persistLocal();return true;
}
function pullSync(){
  if(!state.syncUrl)return;
  if(Date.now()-lastPushAt<3000)return;
  fetch(state.syncUrl).then(function(r){return r.text();}).then(function(txt){
    var o={};try{o=JSON.parse(txt);}catch(e){return;}
    state.syncStatus="on";
    if(applyRemote(o))render();else syncBadge();
  }).catch(function(){state.syncStatus="err";syncBadge();});
}
function startPoll(){if(pollTimer)clearInterval(pollTimer);pollTimer=setInterval(pullSync,20000);}
function connectSync(url){
  url=(url||"").trim();if(!url){flash("先貼上網址");return;}
  state.syncUrl=url;try{localStorage.setItem(SYNC_KEY,url);}catch(e){}
  state.syncStatus="sync";render();
  fetch(url).then(function(r){return r.text();}).then(function(txt){
    var o={};try{o=JSON.parse(txt);}catch(e){}
    if(o&&o.names){applyRemote(o);flash("已連上雲端，載入共用紀錄");}else{pushSync();flash("已連上雲端，已上傳本機紀錄");}
    state.syncStatus="on";state.syncOpen=false;startPoll();render();
  }).catch(function(){state.syncStatus="err";flash("連不上，檢查網址或部署設定（要選『任何人』）");render();});
}
function disconnectSync(){state.syncUrl="";try{localStorage.removeItem(SYNC_KEY);}catch(e){}state.syncStatus="";state.syncOpen=false;if(pollTimer)clearInterval(pollTimer);flash("已中斷同步（改回只存本機）");render();}

var HIST={h:{},cg:{},g:{}};
function getHistory(){var h={},cg={},g={};PEOPLE.forEach(function(p){h[p.id]={};g[p.id]={};});state.log.forEach(function(e){e.entries.forEach(function(x){if(!h[x.p])h[x.p]={};h[x.p][x.c]=(h[x.p][x.c]||0)+1;var grp=x.g||deriveGroup(x.c);cg[x.c]=grp;if(!g[x.p])g[x.p]={};g[x.p][grp]=(g[x.p][grp]||0)+1;});});return {h:h,cg:cg,g:g};}
function refreshHist(){HIST=getHistory();}
function sortCats(cats,h){var go={"打掃":0,"公差":1,"大公差":2,"小公差":3,"打飯":4,"分菜":5};return cats.sort(function(a,b){var ga=go[HIST.cg[a]||deriveGroup(a)],gb=go[HIST.cg[b]||deriveGroup(b)];return ga-gb||h[b]-h[a];});}
function total(id){return sum(HIST.h[id]||{});}
function groupTotal(id,grp){return (HIST.g[id]&&HIST.g[id][grp])||0;}
function nonMealTotal(id){return total(id)-groupTotal(id,"打飯");}

var toastT=null;
function flash(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";clearTimeout(toastT);toastT=setTimeout(function(){t.className="toast";},2200);}

function blockOf(d){if(d.block!==undefined)return d.block;if(d.kind==="meal"){return d.label.indexOf("早")>=0?"AM":d.label.indexOf("午")>=0?"NOON":null;}if(d.period==="GC")return null;return d.period;}

/* ---------- 解析公版 ---------- */
function stripNum(s){return s.replace(/^[\(（]?\s*\d+\s*[\)）]?[\.、]?\s*/,"").trim();}
function extractTime(label){var m=label.match(/^(\d{3,4}\s*[-~～]\s*\d{3,4}|\d{3,4})\s*/);if(m)return {time:m[1].replace(/\s/g,""),rest:label.slice(m[0].length).trim()};return {time:null,rest:label};}
function count261Token(tok){tok=(tok||"").trim();var m;if(/^[（(]?\s*261\s*[）)]?$/.test(tok))return 1;m=tok.match(/^261\s*[*＊]\s*(\d+)$/);if(m)return parseInt(m[1],10);m=tok.match(/^261\s*梯\s*[（(]\s*(\d+)\s*[）)]\s*員?$/);if(m)return parseInt(m[1],10);m=tok.match(/^261\s*梯\s*(\d+)\s*員?$/);if(m)return parseInt(m[1],10);m=tok.match(/^261\s*[（(]\s*(\d+)\s*[）)]$/);if(m)return parseInt(m[1],10);return 0;}
function find261(line){var m=line.match(/261\s*梯\s*[（(]\s*(\d+)\s*[）)]/);if(m)return {n:parseInt(m[1],10),s:m[0]};m=line.match(/261\s*梯\s*(\d+)\s*員/);if(m)return {n:parseInt(m[1],10),s:m[0]};m=line.match(/261\s*[*＊]\s*(\d+)/);if(m)return {n:parseInt(m[1],10),s:m[0]};m=line.match(/261\s*[（(]\s*(\d+)\s*[）)]/);if(m)return {n:parseInt(m[1],10),s:m[0]};m=line.match(/[（(]\s*261\s*[）)]/);if(m)return {n:1,s:m[0]};if(/(?:^|[^0-9])261(?:[^0-9*＊梯]|$)/.test(line))return {n:1,s:"261"};return null;}
function timeBlock(t){return "T"+t.replace(/[-~～]/,"");}
function parseGongban(text){

function toMin(t){t=(t||"").replace(/[^0-9]/g,"");if(t.length<3)return null;t=t.slice(0,4);while(t.length<4)t="0"+t;var h=parseInt(t.slice(0,2),10),m=parseInt(t.slice(2,4),10);if(isNaN(h)||isNaN(m))return null;return h*60+m;}

  var chipRow='<div style="display:flex;gap:7px;overflow-x:auto;padding:2px 2px 10px;-webkit-overflow-scrolling:touch;">'+dates.map(function(c){var on=c.key===selKey;return '<button class="btn" data-action="day-date" data-d="'+esc(c.key)+'" style="flex:0 0 auto;padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:700;border:1px solid '+(on?C.green:C.line)+';background:'+(on?C.greenSoft:C.surface)+';color:'+(on?C.greenDeep:C.sub)+';white-space:nowrap;">'+esc(c.label)+(c.key===state.activeDate&&state.gongban.loaded?" ·排":"")+'</button>';}).join("")+'</div>';
  var toggle='<div style="display:flex;gap:5px;background:'+C.line+';padding:3px;border-radius:12px;margin-bottom:12px;">'+[["A","\u7576\u5929\u6d41\u7a0b"],["B","\u516b\u4eba\u5206\u5de5"]].map(function(mm){var on=mode===mm[0];return '<button class="btn" data-action="day-mode" data-m="'+mm[0]+'" style="flex:1;padding:9px 0;border-radius:9px;font-size:13.5px;font-weight:800;border:none;background:'+(on?C.surface:"transparent")+';color:'+(on?C.greenDeep:C.sub)+';box-shadow:'+(on?"0 1px 4px rgba(0,0,0,.12)":"none")+';">'+mm[1]+'</button>';}).join("")+'</div>';
  var body=mode==="A"?modeA(plan):(dayLegend()+modeB(plan));
  var statusBar="";
  var outs=plan.outs||[],rests=plan.rests||[];
  if(outs.length||rests.length){
    var parts=[];
    outs.forEach(function(o){parts.push('<span style="color:'+(({"大公差":GCOLORS["大公差"],"休假":"#4C7D74","其他":C.sub})[o.reason]||C.sub)+';font-weight:800;">'+esc(nameOf(o.pid))+' '+esc(o.reason)+'</span>');});
    rests.forEach(function(r){parts.push('<span style="color:'+C.amber+';font-weight:800;">'+esc(nameOf(r.pid))+' 補休 '+esc(fmtSpan(r.range))+'</span>');});
    statusBar='<div style="background:'+C.surface+';border:1px solid '+C.line+';border-radius:11px;padding:9px 12px;margin-bottom:12px;font-size:12px;line-height:1.7;">'+parts.join('<span style="color:'+C.line+';">　</span>')+'</div>';
  }
  return chipRow+toggle+statusBar+body;
}

var root=document.getElementById("root"),navEl=document.getElementById("nav"),focusEl=null;

  refreshHist();

  if(focusEl){var el=root.querySelector('[data-input="'+focusEl+'"]');if(el)el.focus();focusEl=null;}
}
function onInput(e){var t=e.target;if(!t.getAttribute)return;var k=t.getAttribute("data-input");if(!k)return;if(k==="paste")pasteText=t.value;else if(k==="import")importText=t.value;else if(k==="restore")restoreText=t.value;else if(k==="syncurl")syncInput=t.value;else if(k==="gpaste")state.guardPaste=t.value;else if(k==="af-name")state.addForm.name=t.value;else if(k==="af-time")state.addForm.time=t.value;else if(k==="spaste")state.schedPaste=t.value;else if(k==="abs-start")state.absForm.start=t.value;else if(k==="abs-range")state.absForm.range=t.value;else if(k==="dtime"){var cd=currentDuty();if(cd){cd.schedTime=t.value;cd.timeSrc="manual";}}else if(k==="name"){state.names[t.getAttribute("data-id")]=t.value;persist();}}
root.addEventListener("input",onInput);overlay.addEventListener("input",onInput);

function handle(a,el){
  var duty=el.getAttribute("data-duty"),pid=el.getAttribute("data-pid"),id=el.getAttribute("data-id"),day=el.getAttribute("data-day"),cat=el.getAttribute("data-cat"),shift=el.getAttribute("data-shift");
  if(a==="noop")return;
  if(state.page==="board"&&state.boardMode==="view"&&{"avail":1,"pick-toggle":1,"set-extra":1,"set-time":1,"toggle-adv":1,"count-dec":1,"count-inc":1,"toggle-keepall":1,"del-duty":1,"open-add":1,"af-period":1,"af-extra":1,"af-keepall":1,"af-dec":1,"af-inc":1,"af-add":1,"af-cancel":1,"auto":1,"commit":1,"open-absence":1}[a]){flash("閱讀模式：點上面鉛筆切換編輯");return;}
  if(a==="noop")return;
  else if(a==="go-board"){state.page="board";closeSheet();state.page="board";render();}
  else if(a==="go-guard"){state.page="guard";closeSheet();state.page="guard";render();}
  else if(a==="go-stats"){state.page="stats";closeSheet();state.page="stats";render();}
  else if(a==="go-day"){state.page="day";closeSheet();state.page="day";render();}
  else if(a==="day-mode"){state.dayView.mode=el.getAttribute("data-m");render();}
  else if(a==="day-date"){state.dayView.date=el.getAttribute("data-d");render();}
  else if(a==="gparse"){var gt=(state.guardPaste||"").trim();if(!gt){flash("先把衛哨公版貼進來");return;}var gr=parseGuard(state.guardPaste);if(!gr.days.length){flash("沒抓到日期或班次，確認格式");return;}state.guard={raw:state.guardPaste,meta:gr.meta,days:gr.days,loaded:true,committed:false};state.showGuardPaste=false;persist();render();}
  else if(a==="grepaste"){state.showGuardPaste=true;state.guardPaste=state.guard.raw;focusEl="gpaste";render();}
  else if(a==="gpick"){openSheet("guard",shift);}
  else if(a==="gpick-toggle"){var gp=parseInt(pid,10),gs=guardShiftById(state.sheet.id);if(gs){var gi=gs.assigned.indexOf(gp);if(gi>=0)gs.assigned.splice(gi,1);else gs.assigned.push(gp);state.guard.committed=false;persist();}refreshSheet();}
  else if(a==="gclear-shift"){var gs2=guardShiftById(shift);if(gs2){gs2.assigned=[];state.guard.committed=false;persist();}refreshSheet();}
  else if(a==="gauto"){guardAuto();}
  else if(a==="gcopy"){copyText(buildGuardFilled());}
  else if(a==="gcommit"){guardCommit();}
  else if(a==="parse"){var txt=(pasteText||"").trim();if(!txt){flash("先把公版貼進來");return;}var r=parseGongban(pasteText);if(!r.duties.length)flash("沒找到含261或打飯的勤務，確認格式");var pd=extractDate(pasteText)||todayLabel();var pwm=pasteText.match(/[（(]([一二三四五六日])[)）]/);state.gongban={raw:pasteText,meta:r.meta,loaded:true};state.duties=r.duties;state.activeDate=pd;state.boardMode="edit";state.boardOpen=true;autoTagTimes();var bd0=state.boards[pd]||{};bd0.wd=pwm?pwm[1]:(bd0.wd||"");state.boards[pd]=bd0;state.showPaste=false;state.showPreview=false;persist();render();}
  else if(a==="repaste"){state.showPaste=true;pasteText=state.gongban.raw;focusEl="paste";render();}
  else if(a==="board-load"){if(loadBoard(el.getAttribute("data-d"))){state.boardMode="view";state.boardOpen=true;state.showPaste=false;}render();}
  else if(a==="board-close"){state.boardOpen=false;state.showPaste=false;render();}
  else if(a==="board-mode"){state.boardMode=(state.boardMode==="view")?"edit":"view";render();}
  else if(a==="sparse"){var st=(state.schedPaste||"").trim();if(!st){flash("先把行動準則貼進來");return;}var sr=parseSched(state.schedPaste);if(!sr.items.length){flash("沒抓到時間，確認格式");return;}state.schedule={raw:state.schedPaste,items:sr.items,title:sr.title,loaded:true,date:extractDate(state.schedPaste)||""};autoTagTimes();persistLocal();flash("已解析準則，並幫對得上的勤務標了時間");render();}
  else if(a==="srepaste"){state.showSchedPaste=true;state.schedPaste=state.schedule.raw;focusEl="spaste";render();}
  else if(a==="avail"){var aid=parseInt(id,10),cd=curDate();if(absenceRec(aid,cd))clearAbsent(aid,cd);else setAbsent(aid,cd,{reason:"其他",until:""});syncAvail();persist();render();}
  else if(a==="open-absence"){state.absForm={reason:"補休",start:curDate(),len:1,range:""};openSheet("absence",0);}
  else if(a==="abs-person"){state.sheet.id=parseInt(id,10);refreshSheet();}
  else if(a==="abs-reason"){state.absForm.reason=el.getAttribute("data-r");refreshSheet();}
  else if(a==="abs-len"){state.absForm.len=parseInt(el.getAttribute("data-n"),10)||1;refreshSheet();}
  else if(a==="abs-range-q"){state.absForm.range=el.getAttribute("data-t");refreshSheet();}
  else if(a==="abs-add"){var apid=state.sheet.id;if(!apid){flash("先選一個人");return;}var f=state.absForm,s0=(f.start||"").trim()||curDate();if(!/\d{1,2}\/\d{1,2}/.test(s0)){flash("日期格式如 7/8");return;}if(f.reason==="補休"){var rg=(f.range||"").replace(/\s/g,"");if(!spanMin(rg)||rg.indexOf("-")<0){flash("補休時段格式如 1220-1430");return;}setAbsent(apid,s0,{reason:"補休",range:rg});flash("已記錄 "+nameOf(apid)+" 補休 "+fmtSpan(rg));}else{for(var ai=0;ai<f.len;ai++){setAbsent(apid,addDaysMD(s0,ai),{reason:f.reason,range:""});}flash("已記錄 "+nameOf(apid)+" "+f.reason+"（"+f.len+" 天）");}syncAvail();persist();refreshSheet();}
  else if(a==="abs-del"){clearAbsent(parseInt(id,10),el.getAttribute("data-md"));syncAvail();persist();refreshSheet();}
  else if(a==="pick"){openSheet("picker",duty);}
  else if(a==="open-person"){openSheet("person",parseInt(id,10));}
  else if(a==="close-sheet"){closeSheet();}
  else if(a==="count-dec"){var d1=currentDuty();if(d1)d1.count=Math.max(1,d1.count-1);refreshSheet();}
  else if(a==="count-inc"){var d2=currentDuty();if(d2)d2.count=Math.min(8,d2.count+1);refreshSheet();}
  else if(a==="toggle-keepall"){var d3=currentDuty();if(d3){d3.keepAll=!d3.keepAll;if(d3.keepAll)d3.assigned=[];}refreshSheet();}
  else if(a==="del-duty"){var d4=currentDuty();if(d4){if(d4.kind==="manual")state.duties=state.duties.filter(function(x){return x!==d4;});else d4.removed=true;}closeSheet();}
  else if(a==="pick-toggle"){var pv=parseInt(pid,10),dd=currentDuty();if(dd){var i=dd.assigned.indexOf(pv);if(i>=0)dd.assigned.splice(i,1);else dd.assigned.push(pv);}refreshSheet();}
  else if(a==="set-extra"){var de=currentDuty();if(de){var ex=el.getAttribute("data-ex");de.extra=(ex==="none")?null:ex;}refreshSheet();}
  else if(a==="set-time"){var dt=currentDuty();if(dt){dt.schedTime=el.getAttribute("data-t");dt.timeSrc="manual";}refreshSheet();}
  else if(a==="toggle-adv"){pickAdv=!pickAdv;refreshSheet();}
  else if(a==="ps-dec"){removeOne(parseInt(id,10),cat);persist();refreshSheet();}
  else if(a==="ps-toggle"){var pg=el.getAttribute("data-g");psOpen[pg]=!psOpen[pg];refreshSheet();}
  else if(a==="ps-clear"){clearPerson(parseInt(id,10));persist();closeSheet();flash("已清空該人紀錄");}
  else if(a==="auto"){autoAssign();}
  else if(a==="copy-filled"){copyText(buildFilled());}
  else if(a==="copy-persons"){copyText(buildPersonList());}
  else if(a==="toggle-preview"){state.showPreview=!state.showPreview;render();}
  else if(a==="commit"){commit();}
  else if(a==="open-add"){state.addForm.open=true;focusEl="af-name";render();}
  else if(a==="af-cancel"){state.addForm={open:false,name:"",period:"AM",count:1,keepAll:false,extra:null,time:""};render();}
  else if(a==="af-period"){state.addForm.period=el.getAttribute("data-p");render();}
  else if(a==="af-extra"){var afx=el.getAttribute("data-ex");state.addForm.extra=(afx==="none")?null:afx;render();}
  else if(a==="af-keepall"){state.addForm.keepAll=!state.addForm.keepAll;render();}
  else if(a==="af-dec"){state.addForm.count=Math.max(1,state.addForm.count-1);render();}
  else if(a==="af-inc"){state.addForm.count=Math.min(8,state.addForm.count+1);render();}
  else if(a==="af-add"){var f=state.addForm;var nm=(f.name||"").trim();if(!nm){flash("先幫勤務取個名字");return;}state.duties.push({id:"m"+Date.now(),kind:"manual",mode:"append",label:nm,time:null,period:f.period,block:(f.period==="GC"?null:f.period),count:f.keepAll?0:Math.max(1,f.count),assigned:[],keepAll:f.keepAll,removed:false,extra:f.extra||null,schedTime:f.time||"",timeSrc:f.time?"manual":""});state.addForm={open:false,name:"",period:"AM",count:1,keepAll:false,extra:null,time:""};render();}
  else if(a==="open-import"){state.importOpen=true;focusEl="import";render();}
  else if(a==="cancel-import"){state.importOpen=false;importText="";render();}
  else if(a==="do-import"){var it=(importText||"").trim();if(!it){flash("先把公版貼進來");return;}var pr=parseFilled(importText);if(!pr.entries.length){flash("沒抓到我們的名字，確認公版已填好名字");return;}var wm=importText.match(/[（(]([一二三四五六日])[)）]/),md=pr.date.replace(/[（(].*$/,"");state.log=state.log.filter(function(e){return String(e.id)!=="b_"+md;});state.log.push({id:"b_"+md,date:md,entries:pr.entries});boardFromImport(pr.date,pr.entries,wm?wm[1]:"");state.plans[md]=planFromImport(pr.date,pr.entries,wm?wm[1]:"");persist();state.importOpen=false;importText="";flash("已記錄 "+md+"（"+pr.entries.length+" 人次）·排班/行程都更新了");render();}
  else if(a==="del-day"){state.log=state.log.filter(function(e){return String(e.id)!==String(day);});persist();flash("已刪除該天紀錄");render();}
  else if(a==="ask-reset"){state.confirmReset=true;render();}
  else if(a==="open-backup"){state.backupOpen=true;render();}
  else if(a==="open-sync"){state.syncOpen=true;syncInput=state.syncUrl;render();}
  else if(a==="close-sync"){state.syncOpen=false;render();}
  else if(a==="connect-sync"){connectSync(syncInput||state.syncUrl);}
  else if(a==="disconnect-sync"){disconnectSync();}
  else if(a==="pull-now"){flash("同步中…");pullSync();}
  else if(a==="close-backup"){state.backupOpen=false;restoreText="";render();}
  else if(a==="copy-backup"){copyText(JSON.stringify({v:3,names:state.names,log:state.log,mealQueue:state.mealQueue}));}
  else if(a==="do-restore"){var rt=(restoreText||"").trim();if(!rt){flash("先貼上備份碼");return;}try{var o=JSON.parse(rt);if(o.names)state.names=o.names;if(o.log)state.log=o.log;if(o.mealQueue&&o.mealQueue.length===8)state.mealQueue=o.mealQueue;persist();state.backupOpen=false;restoreText="";flash("已還原備份");render();}catch(err){flash("備份碼格式不對");}}
  else if(a==="cancel-reset"){state.confirmReset=false;render();}
  else if(a==="do-reset"){state.log=[];state.confirmReset=false;persist();flash("統計已全部清空");render();}
}
