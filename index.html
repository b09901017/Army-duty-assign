<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="排勤務板" />
<meta name="theme-color" content="#2A4634" />
<title>261 排勤務板</title>
<style>
  :root{--bg:#F1F3EE;--surface:#fff;--ink:#20261E;--sub:#6C7268;--line:#E3E5DC;--green:#3B6147;--green-deep:#2A4634;--green-soft:#E9EFE8;--brass:#A9793F;--brass-soft:#F5ECDB;--amber:#9A6B14;--amber-soft:#F7EFDB;--red:#B0453C;--red-soft:#F6E5E2;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
  body{font-family:system-ui,-apple-system,"Noto Sans TC","PingFang TC",sans-serif;color:var(--ink);}
  button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  input,textarea{font:inherit;}
  svg{display:block;}
  .wrap{max-width:600px;margin:0 auto;padding:16px 14px 96px;}
  .btn{transition:transform .12s ease,background .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .btn:active{transform:translateY(1px) scale(.985);}
  .tap:active{transform:scale(.96);}
  *:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
  .backdrop{position:fixed;inset:0;background:rgba(20,30,22,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .2s ease;}
  .sheet{width:100%;max-width:600px;background:var(--surface);border-radius:20px 20px 0 0;padding:0 14px 22px;box-shadow:0 -8px 30px rgba(0,0,0,.18);animation:slide .28s cubic-bezier(.2,.8,.2,1);}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--green-deep);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88vw;text-align:center;display:none;}
  .toast.show{display:block;animation:fade .25s ease;}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:saturate(1.1) blur(8px);border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;border:none;background:transparent;padding:11px 0 13px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11.5px;font-weight:700;color:var(--sub);}
  .nav button.on{color:var(--green-deep);}
  @keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<div id="overlay"></div>
<div id="toast" class="toast"></div>
<div id="nav" class="nav"></div>

<script>
"use strict";

var PEOPLE=[{id:1,code:"01",name:"李愷宸"},{id:2,code:"02",name:"江偉綸"},{id:3,code:"03",name:"陳柏翰"},{id:4,code:"04",name:"鄧旭辰"},{id:5,code:"05",name:"廖翊滕"},{id:6,code:"06",name:"陳俊穎"},{id:7,code:"07",name:"林柏宇"},{id:8,code:"08",name:"林崇浩"}];
var ORDER=[1,2,3,4,5,6,7,8];
var PERIODS=[{key:"AM",label:"上午",meal:"早"},{key:"NOON",label:"午",meal:"午"},{key:"PM",label:"晚",meal:"晚"}];
var C={bg:"#F1F3EE",surface:"#fff",ink:"#20261E",sub:"#6C7268",line:"#E3E5DC",green:"#3B6147",greenDeep:"#2A4634",greenSoft:"#E9EFE8",brass:"#A9793F",brassSoft:"#F5ECDB",amber:"#9A6B14",amberSoft:"#F7EFDB",red:"#B0453C",redSoft:"#F6E5E2"};
var PAL=["#3B6147","#4E6E8E","#8E5A6E","#6E7D3D","#B06A3C","#4C7D74","#7A6BA8","#997A2E","#A65A5A","#5B8C6E","#54708A","#8A6D3B","#6B5B95","#3F7D6E","#A34E5E","#5F8C3A","#7E6248","#4670A0","#9C5B7C","#4A8577"];
var STORE_KEY="duty-board-v3";

var ICON={plus:'<path d="M12 5v14"/><path d="M5 12h14"/>',minus:'<path d="M5 12h14"/>',x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',check:'<path d="M20 6 9 17l-5-5"/>',rotate:'<path d="M3 12a9 9 0 1 0 9-9 9.7 9.7 0 0 0-6.7 2.7L3 8"/><path d="M3 3v5h5"/>',copy:'<rect x="8" y="8" width="14" height="14" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',wand:'<path d="M4 20 14 10"/><path d="m17 3 1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/>',trash:'<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>',board:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/>',chart:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',lock:'<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'};
function icon(n,s,c){s=s||18;c=c||"currentColor";return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ICON[n]+'</svg>';}
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function nameOf(id){return state.names[id];}
function personByCode(pid){for(var i=0;i<PEOPLE.length;i++)if(PEOPLE[i].id===pid)return PEOPLE[i];return null;}
function splitColon(line){var i=line.search(/[：:]/);if(i<0)return null;return {label:line.slice(0,i).trim(),colon:line[i],rhs:line.slice(i+1)};}
function catColor(cat){if(cat==="打飯")return C.brass;var h=0;for(var i=0;i<cat.length;i++)h=(h*31+cat.charCodeAt(i))>>>0;return PAL[h%PAL.length];}
function sum(o){var s=0;for(var k in o)s+=o[k];return s;}
function todayLabel(){var d=new Date();return (d.getMonth()+1)+"/"+d.getDate();}
function extractDate(t){var m=t.match(/(\d{1,2})\s*[\/月]\s*(\d{1,2})/);return m?(parseInt(m[1],10)+"/"+parseInt(m[2],10)):null;}
function pord(p){return p==="AM"?0:p==="NOON"?1:2;}

/* ---------- 狀態 ---------- */
function loadSaved(){try{var r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
var saved=loadSaved();
function migrateLog(s){
  if(!s)return [];
  if(s.log)return s.log;
  var entries=[];
  if(s.history){for(var id in s.history){var h=s.history[id];for(var cat in h){for(var i=0;i<h[cat];i++)entries.push({p:parseInt(id,10),c:cat});}}}
  else if(s.counts){for(var id2 in s.counts){for(var j=0;j<s.counts[id2];j++)entries.push({p:parseInt(id2,10),c:"先前紀錄"});}}
  return entries.length?[{id:1,date:"先前",entries:entries}]:[];
}
var state={
  names:(function(){var o={};PEOPLE.forEach(function(p){o[p.id]=p.name;});if(saved&&saved.names)for(var k in saved.names)o[k]=saved.names[k];return o;})(),
  log:migrateLog(saved),
  mealQueue:(function(){if(saved&&saved.mealQueue&&saved.mealQueue.length===8)return saved.mealQueue.slice();if(saved&&typeof saved.mealPtr==="number"){var p=((saved.mealPtr%8)+8)%8;return ORDER.slice(p).concat(ORDER.slice(0,p));}return ORDER.slice();})(),
  available:(function(){var o={};PEOPLE.forEach(function(p){o[p.id]=true;});return o;})(),
  gongban:{raw:"",meta:[],loaded:false},
  duties:[],
  sheet:null,
  page:"board",
  showPaste:false,showPreview:false,
  addForm:{open:false,name:"",period:"AM",count:1,keepAll:false},
  importOpen:false,confirmReset:false
};
var pasteText="",importText="";
function persist(){try{localStorage.setItem(STORE_KEY,JSON.stringify({names:state.names,log:state.log,mealQueue:state.mealQueue}));}catch(e){}}

var HIST={};
function getHistory(){var h={};PEOPLE.forEach(function(p){h[p.id]={};});state.log.forEach(function(e){e.entries.forEach(function(x){if(!h[x.p])h[x.p]={};h[x.p][x.c]=(h[x.p][x.c]||0)+1;});});return h;}
function refreshHist(){HIST=getHistory();}
function total(id){return sum(HIST[id]||{});}
function nonMealTotal(id){var h=HIST[id]||{},s=0;for(var k in h){if(k!=="打飯")s+=h[k];}return s;}

var toastT=null;
function flash(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";clearTimeout(toastT);toastT=setTimeout(function(){t.className="toast";},2200);}

function blockOf(d){if(d.kind==="meal"){return d.label.indexOf("早")>=0?"AM":d.label.indexOf("午")>=0?"NOON":null;}return d.period;}

/* ---------- 解析公版 ---------- */
function parseGongban(text){
  var lines=text.replace(/\r/g,"").split("\n"),section="",sub="AM",duties=[];
  var meta=lines.map(function(raw,idx){
    var line=raw,t=line.trim();
    if(line.indexOf("🔷")>=0){section=line.indexOf("公差")>=0?"gongcha":line.indexOf("打飯")>=0?"meal":"clean";return {type:"static",text:raw};}
    if(/^(上午|中午|下午|午|晚|晚間|晚上)$/.test(t)){sub=/上午/.test(t)?"AM":/(晚|下午)/.test(t)?"PM":"NOON";return {type:"static",text:raw};}
    if(section==="gongcha")return {type:"static",text:raw};
    var sc=splitColon(line);
    if(sc){var mm=sc.label.match(/(早打|午打|晚打)/);if(mm){var per=mm[1]==="早打"?"AM":mm[1]==="午打"?"NOON":"PM";var dm={id:"d"+idx,kind:"meal",label:sc.label,period:per,count:1,assigned:[],keepAll:false,removed:false,original:raw};duties.push(dm);return {type:"duty",dutyId:dm.id};}}
    if(/261/.test(line)&&sc){
      var toks=sc.rhs.split("+").map(function(x){return x.trim();}),fi=-1,cnt=1,ot="261";
      for(var i=0;i<toks.length;i++){var tm=toks[i].match(/^261\s*(?:\*\s*(\d+))?$/);if(tm){fi=i;cnt=tm[1]?parseInt(tm[1],10):1;ot=toks[i];break;}}
      if(fi>=0){var df={id:"d"+idx,kind:"fill",label:sc.label,period:sub,count:cnt,assigned:[],keepAll:false,removed:false,original:raw,tokIdx:fi,origTok:ot};duties.push(df);return {type:"duty",dutyId:df.id};}
    }
    return {type:"static",text:raw};
  });
  return {meta:meta,duties:duties};
}
function dutyById(id){for(var i=0;i<state.duties.length;i++)if(state.duties[i].id===id)return state.duties[i];return null;}
function rebuildLine(m){
  if(m.type==="static")return m.text;
  var d=dutyById(m.dutyId);if(!d)return "";
  if(d.kind==="meal"){return (!d.removed&&d.assigned.length)?d.original.replace(/\s+$/,"")+" + "+d.assigned.map(nameOf).join(" + "):d.original;}
  var sc=splitColon(d.original);if(!sc)return d.original;
  var toks=sc.rhs.split("+").map(function(x){return x.trim();}),fi=d.tokIdx;
  if(d.keepAll&&!d.removed)toks[fi]=d.origTok;
  else if(!d.removed&&d.assigned.length)toks[fi]=d.assigned.map(nameOf).join("+");
  else toks.splice(fi,1);
  return sc.label+sc.colon+toks.join("+");
}
function buildFilled(){
  var base=state.gongban.meta.map(rebuildLine).join("\n");
  var extra=state.duties.filter(function(d){return d.kind==="manual"&&!d.removed&&(d.keepAll||d.assigned.length);}).map(function(d){return d.label+"："+(d.keepAll?"261":d.assigned.map(nameOf).join("+"));});
  return base+(extra.length?"\n"+extra.join("\n"):"");
}
function parseFilled(text){
  var lines=text.replace(/\r/g,"").split("\n"),dateLabel=extractDate(text)||todayLabel(),entries=[];
  var nmeMap={};PEOPLE.forEach(function(p){nmeMap[state.names[p.id]]=p.id;});
  lines.forEach(function(line){
    if(line.indexOf("🔷")>=0)return;
    var sc=splitColon(line);if(!sc)return;
    var lb=sc.label.replace(/^[\(（]?\s*\d+\s*[\)）]?[\.、]?\s*/,"").trim();if(!lb)return;
    var cat=/(早打|午打|晚打|打飯)/.test(lb)?"打飯":lb;
    var toks=sc.rhs.split(/[+、,，\s]+/).map(function(x){return x.trim();}).filter(Boolean);
    var allT=/八人一起|全班/.test(sc.rhs)||toks.some(function(x){return /^261(\*\d+)?$/.test(x);});
    if(allT){PEOPLE.forEach(function(p){entries.push({p:p.id,c:cat});});}
    else{toks.forEach(function(tk){if(Object.prototype.hasOwnProperty.call(nmeMap,tk))entries.push({p:nmeMap[tk],c:cat});});}
  });
  return {date:dateLabel,entries:entries};
}

/* ---------- 分配 ---------- */
function computeConflicts(){
  var seen={},res={};
  state.duties.forEach(function(d){if(d.removed||d.keepAll)return;var b=blockOf(d);if(!b)return;d.assigned.forEach(function(pid){var k=b+":"+pid;seen[k]=(seen[k]||0)+1;});});
  for(var k in seen){if(seen[k]>1)res[k]=true;}
  return res;
}
function occupiesFor(duty){var B=blockOf(duty),o={};if(!B)return o;state.duties.forEach(function(x){if(x===duty||x.removed||x.keepAll)return;if(blockOf(x)!==B)return;x.assigned.forEach(function(pid){if(o[pid]===undefined)o[pid]=x.label;});});return o;}
function autoAssign(){
  refreshHist();
  // 1) 打飯：輪流隊列，補休者保留順位、回來先輪到
  var q=state.mealQueue.slice(),assignedToday={};
  var meals=state.duties.filter(function(d){return d.kind==="meal"&&!d.removed;}).sort(function(a,b){return pord(a.period)-pord(b.period);});
  meals.forEach(function(m){
    var idx=-1;
    for(var i=0;i<q.length;i++){var pid=q[i];if(state.available[pid]&&!assignedToday[pid]){idx=i;break;}}
    if(idx<0){m.assigned=[];return;}
    var pid=q[idx];m.assigned=[pid];assignedToday[pid]=true;q.splice(idx,1);q.push(pid);
  });
  // 2) 其他勤務：同一項做過最少的人優先，其次整體較少
  var work={};PEOPLE.forEach(function(p){work[p.id]=nonMealTotal(p.id);});
  var pset={AM:{},NOON:{},PM:{}};
  state.duties.forEach(function(d){if(d.removed||d.keepAll)return;var b=blockOf(d);d.assigned.forEach(function(pid){if(d.kind!=="meal")work[pid]=(work[pid]||0)+1;if(b)pset[b][pid]=true;});});
  var catWork={};
  function cw(cat,pid){if(!catWork[cat])catWork[cat]={};if(catWork[cat][pid]===undefined)catWork[cat][pid]=(HIST[pid]&&HIST[pid][cat])||0;return catWork[cat][pid];}
  state.duties.forEach(function(d){if(d.kind==="meal"||d.removed||d.keepAll)return;d.assigned.forEach(function(pid){catWork[d.label]=catWork[d.label]||{};catWork[d.label][pid]=cw(d.label,pid)+1;});});
  var avail=PEOPLE.filter(function(p){return state.available[p.id];}),short=false;
  state.duties.forEach(function(d){
    if(d.kind==="meal"||d.removed||d.keepAll)return;
    var b=blockOf(d),cat=d.label,need=d.count-d.assigned.length;
    for(var i=0;i<need;i++){
      var cand=avail.filter(function(p){if(d.assigned.indexOf(p.id)>=0)return false;if(b&&pset[b][p.id])return false;return true;});
      if(!cand.length){short=true;break;}
      cand.sort(function(a,c){return cw(cat,a.id)-cw(cat,c.id)||work[a.id]-work[c.id]||a.id-c.id;});
      var pk=cand[0];d.assigned.push(pk.id);work[pk.id]++;catWork[cat]=catWork[cat]||{};catWork[cat][pk.id]=cw(cat,pk.id)+1;if(b)pset[b][pk.id]=true;
    }
  });
  flash(short?"已分配，但有時段人手不足":"已分配（打飯輪流·勤務均分）");render();
}
function commit(){
  var entries=[];
  state.duties.forEach(function(d){
    if(d.removed)return;
    if(d.keepAll){PEOPLE.forEach(function(p){entries.push({p:p.id,c:d.label});});}
    else{var cat=d.kind==="meal"?"打飯":d.label;d.assigned.forEach(function(pid){entries.push({p:pid,c:cat});});}
  });
  if(!entries.length){flash("目前沒有可計入的分配");return;}
  var date=extractDate(state.gongban.raw)||todayLabel();
  state.log.push({id:Date.now(),date:date,entries:entries});
  var mealPpl=state.duties.filter(function(d){return d.kind==="meal"&&!d.removed&&d.assigned.length;}).sort(function(a,b){return pord(a.period)-pord(b.period);}).map(function(d){return d.assigned[0];});
  mealPpl.forEach(function(pid){var i=state.mealQueue.indexOf(pid);if(i>=0){state.mealQueue.splice(i,1);state.mealQueue.push(pid);}});
  persist();
  state.duties=[];state.gongban={raw:"",meta:[],loaded:false};state.showPaste=false;state.showPreview=false;pasteText="";
  state.addForm={open:false,name:"",period:"AM",count:1,keepAll:false};
  PEOPLE.forEach(function(p){state.available[p.id]=true;});
  flash("已計入統計（"+date+"），今日已清空");render();
}
function copyText(text){if(!text)return;function ok(){flash("已複製");}function bad(){flash("複製失敗，請長按框內文字選取");}try{if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(ok,bad);else bad();}catch(e){bad();}}
function removeOne(pid,cat){for(var i=state.log.length-1;i>=0;i--){var e=state.log[i];for(var j=0;j<e.entries.length;j++){if(e.entries[j].p===pid&&e.entries[j].c===cat){e.entries.splice(j,1);if(!e.entries.length)state.log.splice(i,1);return true;}}}return false;}
function clearPerson(pid){for(var i=state.log.length-1;i>=0;i--){var e=state.log[i];e.entries=e.entries.filter(function(x){return x.p!==pid;});if(!e.entries.length)state.log.splice(i,1);}}

/* ---------- 片段 ---------- */
function badge(code,size,tone){var bg=tone==="mute"?C.line:C.greenDeep,col=tone==="mute"?C.sub:"#fff";return '<span style="width:'+size+'px;height:'+size+'px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;background:'+bg+';color:'+col+';font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px;flex-shrink:0;">'+code+'</span>';}
function card(inner,extra){return '<div style="background:'+C.surface+';border:1px solid '+C.line+';border-radius:16px;padding:15px;'+(extra||"")+'">'+inner+'</div>';}
function label(t){return '<div style="font-size:12px;font-weight:800;letter-spacing:1px;color:'+C.sub+';">'+t+'</div>';}
function header(){var d=new Date().toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit",weekday:"short"});var title=state.page==="board"?"排班板":"統計";return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><div style="width:36px;height:36px;border-radius:10px;background:'+C.greenDeep+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;">261</div><div><div style="font-size:18px;font-weight:800;">'+title+'</div><div style="font-size:12px;color:'+C.sub+';">'+d+' · 8 員</div></div></div>';}

function pasteCard(){
  var showBox=!state.gongban.loaded||state.showPaste;
  if(showBox){return card(label("貼上今天的公版")+'<textarea data-input="paste" placeholder="把班長給的整份公版貼進來，會自動抓出所有含 261 的勤務和打飯。" style="width:100%;height:120px;margin-top:10px;padding:12px;border-radius:10px;border:1px solid '+C.line+';background:'+C.bg+';font-size:13.5px;line-height:1.6;outline:none;resize:vertical;font-family:ui-monospace,Menlo,monospace;">'+esc(pasteText)+'</textarea><button class="btn" data-action="parse" style="width:100%;margin-top:10px;padding:13px;border-radius:11px;border:none;background:'+C.greenDeep+';color:#fff;font-weight:800;font-size:15px;">解析勤務</button>');}
  var n=state.duties.filter(function(d){return !d.removed;}).length;
  return '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:'+C.greenSoft+';border:1px solid '+C.green+';border-radius:12px;padding:11px 14px;"><div style="display:flex;align-items:center;gap:8px;color:'+C.greenDeep+';font-weight:700;font-size:13.5px;">'+icon("check",16,C.green)+' 公版已載入 · '+n+' 項勤務</div><button class="btn" data-action="repaste" style="border:none;background:transparent;color:'+C.green+';font-weight:700;font-size:13px;text-decoration:underline;">重新貼上</button></div>';
}

  var h=HIST[id]||{},cats=Object.keys(h).filter(function(k){return h[k]>0;});cats.sort(function(a,b){return h[b]-h[a];});
  var tot=cats.reduce(function(s,k){return s+h[k];},0);
  var rows=cats.length?cats.map(function(k){return '<div style="display:flex;align-items:center;gap:10px;padding:9px 4px;"><span style="width:12px;height:12px;border-radius:4px;background:'+catColor(k)+';flex-shrink:0;"></span><span style="flex:1;font-size:14px;font-weight:600;">'+esc(k)+'</span><span style="font-size:14px;font-weight:800;color:'+C.greenDeep+';font-variant-numeric:tabular-nums;">×'+h[k]+'</span><button class="btn" data-action="ps-dec" data-id="'+id+'" data-cat="'+esc(k)+'" style="width:30px;height:30px;border-radius:8px;border:1px solid '+C.line+';background:'+C.surface+';color:'+C.red+';display:flex;align-items:center;justify-content:center;">'+icon("minus",15)+'</button></div>';}).join(""):'<div style="text-align:center;color:'+C.sub+';font-size:13px;padding:22px 0;">這個人還沒有紀錄。</div>';
  return handleBar()
    +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:6px;">'+badge(personByCode(id).code,28,"green")+'<input data-input="name" data-id="'+id+'" value="'+esc(nameOf(id))+'" style="flex:1;min-width:0;border:none;background:transparent;font-size:16px;font-weight:800;color:'+C.ink+';outline:none;padding:0;" />'+xBtn()+'</div>'
    +'<div style="display:flex;align-items:baseline;gap:4px;margin:0 4px 6px;"><span style="font-size:24px;font-weight:800;color:'+C.greenDeep+';">'+tot+'</span><span style="font-size:12px;color:'+C.sub+';">次總計</span></div>'
    +'<div class="sheet-list" style="max-height:40vh;overflow-y:auto;">'+rows+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:12px;"><button class="btn" data-action="ps-clear" data-id="'+id+'" style="flex:0 0 auto;padding:13px 14px;border-radius:12px;border:1px solid '+C.redSoft+';background:'+C.redSoft+';color:'+C.red+';font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:5px;">'+icon("trash",15)+' 清空此人</button><button class="btn" data-action="close-sheet" style="flex:1;padding:13px;border-radius:12px;border:none;background:'+C.green+';color:#fff;font-weight:800;font-size:15px;">完成</button></div>';
}
function sheetInner(){var s=state.sheet;if(!s)return "";if(s.type==="picker"){var d=dutyById(s.id);return d?pickerInner(d):"";}if(s.type==="person")return personInner(s.id);return "";}
function attachDrag(el){
  var handle=el.querySelector('[data-drag]');if(!handle)return;var startY=0,dragging=false;
  handle.onpointerdown=function(e){dragging=true;startY=e.clientY;el.style.transition="none";try{handle.setPointerCapture(e.pointerId);}catch(_){}};
  handle.onpointermove=function(e){if(!dragging)return;var dy=Math.max(0,e.clientY-startY);el.style.transform="translateY("+dy+"px)";};
  handle.onpointerup=function(e){if(!dragging)return;dragging=false;var dy=Math.max(0,e.clientY-startY);if(dy>90){closeSheet();}else{el.style.transition="transform .22s ease";el.style.transform="translateY(0)";}};
  handle.onpointercancel=function(){dragging=false;el.style.transition="transform .22s ease";el.style.transform="translateY(0)";};
}
function openSheet(type,id){state.sheet={type:type,id:id};refreshHist();overlay.innerHTML='<div class="backdrop" data-action="close-sheet"><div class="sheet" data-action="noop">'+sheetInner()+'</div></div>';attachDrag(overlay.querySelector('.sheet'));}
function refreshSheet(){if(!state.sheet){closeSheet();return;}refreshHist();var el=overlay.querySelector('.sheet');if(!el){openSheet(state.sheet.type,state.sheet.id);return;}var lw=el.querySelector('.sheet-list');var sc=lw?lw.scrollTop:0;el.innerHTML=sheetInner();var lw2=el.querySelector('.sheet-list');if(lw2)lw2.scrollTop=sc;attachDrag(el);}
function closeSheet(){overlay.innerHTML="";state.sheet=null;render();}

/* ---------- 渲染 ---------- */
var root=document.getElementById("root"),navEl=document.getElementById("nav"),focusEl=null;
function render(){
  refreshHist();
  var h=header();
  if(state.page==="board"){h+=pasteCard();if(state.gongban.loaded){h+=availCard()+mealsRow()+dutyList()+boardActions();if(state.showPreview)h+=previewCard();h+=commitBtn();}}
  else{h+=statsPage();}
  root.innerHTML=h;
  navEl.innerHTML='<button data-action="go-board" class="'+(state.page==="board"?"on":"")+'">'+icon("board",20)+'排班</button><button data-action="go-stats" class="'+(state.page==="stats"?"on":"")+'">'+icon("chart",20)+'統計</button>';
  if(focusEl){var el=root.querySelector('[data-input="'+focusEl+'"]');if(el)el.focus();focusEl=null;}
}
function onInput(e){var t=e.target;if(!t.getAttribute)return;var k=t.getAttribute("data-input");if(!k)return;if(k==="paste")pasteText=t.value;else if(k==="import")importText=t.value;else if(k==="af-name")state.addForm.name=t.value;else if(k==="name"){state.names[t.getAttribute("data-id")]=t.value;persist();}}
root.addEventListener("input",onInput);overlay.addEventListener("input",onInput);

function handle(a,el){
  var duty=el.getAttribute("data-duty"),pid=el.getAttribute("data-pid"),id=el.getAttribute("data-id"),day=el.getAttribute("data-day"),cat=el.getAttribute("data-cat");
  if(a==="noop")return;
  else if(a==="go-board"){state.page="board";closeSheet();state.page="board";render();}
  else if(a==="go-stats"){state.page="stats";closeSheet();state.page="stats";render();}
  else if(a==="parse"){var txt=(pasteText||"").trim();if(!txt){flash("先把公版貼進來");return;}var r=parseGongban(pasteText);if(!r.duties.length)flash("沒找到含261或打飯的勤務，確認格式");state.gongban={raw:pasteText,meta:r.meta,loaded:true};state.duties=r.duties;state.showPaste=false;state.showPreview=false;render();}
  else if(a==="repaste"){state.showPaste=true;pasteText=state.gongban.raw;focusEl="paste";render();}
  else if(a==="avail"){state.available[id]=!state.available[id];render();}
  else if(a==="pick"){openSheet("picker",duty);}
  else if(a==="open-person"){openSheet("person",parseInt(id,10));}
  else if(a==="close-sheet"){closeSheet();}
  else if(a==="count-dec"){var d1=currentDuty();if(d1)d1.count=Math.max(1,d1.count-1);refreshSheet();}
  else if(a==="count-inc"){var d2=currentDuty();if(d2)d2.count=Math.min(8,d2.count+1);refreshSheet();}
  else if(a==="toggle-keepall"){var d3=currentDuty();if(d3){d3.keepAll=!d3.keepAll;if(d3.keepAll)d3.assigned=[];}refreshSheet();}
  else if(a==="del-duty"){var d4=currentDuty();if(d4){if(d4.kind==="manual")state.duties=state.duties.filter(function(x){return x!==d4;});else d4.removed=true;}closeSheet();}
  else if(a==="pick-toggle"){var pv=parseInt(pid,10),dd=currentDuty();if(dd){var i=dd.assigned.indexOf(pv);if(i>=0)dd.assigned.splice(i,1);else{if(dd.kind==="meal")dd.assigned=[pv];else dd.assigned.push(pv);}}refreshSheet();}
  else if(a==="ps-dec"){removeOne(parseInt(id,10),cat);persist();refreshSheet();}
  else if(a==="ps-clear"){clearPerson(parseInt(id,10));persist();closeSheet();flash("已清空該人紀錄");}
  else if(a==="auto"){autoAssign();}
  else if(a==="copy-filled"){copyText(buildFilled());}
  else if(a==="toggle-preview"){state.showPreview=!state.showPreview;render();}
  else if(a==="commit"){commit();}
  else if(a==="open-add"){state.addForm.open=true;focusEl="af-name";render();}
  else if(a==="af-cancel"){state.addForm={open:false,name:"",period:"AM",count:1,keepAll:false};render();}
  else if(a==="af-period"){state.addForm.period=el.getAttribute("data-p");render();}
  else if(a==="af-keepall"){state.addForm.keepAll=!state.addForm.keepAll;render();}
  else if(a==="af-dec"){state.addForm.count=Math.max(1,state.addForm.count-1);render();}
  else if(a==="af-inc"){state.addForm.count=Math.min(8,state.addForm.count+1);render();}
  else if(a==="af-add"){var f=state.addForm;var nm=(f.name||"").trim();if(!nm){flash("先幫勤務取個名字");return;}state.duties.push({id:"m"+Date.now(),kind:"manual",label:nm,period:f.period,count:f.keepAll?0:Math.max(1,f.count),assigned:[],keepAll:f.keepAll,removed:false});state.addForm={open:false,name:"",period:"AM",count:1,keepAll:false};render();}
  else if(a==="open-import"){state.importOpen=true;focusEl="import";render();}
  else if(a==="cancel-import"){state.importOpen=false;importText="";render();}
  else if(a==="do-import"){var it=(importText||"").trim();if(!it){flash("先把公版貼進來");return;}var pr=parseFilled(importText);if(!pr.entries.length){flash("沒抓到我們的名字，確認公版已填好名字");return;}state.log.push({id:Date.now(),date:pr.date,entries:pr.entries});persist();state.importOpen=false;importText="";flash("已記錄 "+pr.date+"（"+pr.entries.length+" 人次）");render();}
  else if(a==="del-day"){var did=parseInt(day,10);state.log=state.log.filter(function(e){return e.id!==did;});persist();flash("已刪除該天紀錄");render();}
  else if(a==="ask-reset"){state.confirmReset=true;render();}
  else if(a==="cancel-reset"){state.confirmReset=false;render();}
  else if(a==="do-reset"){state.log=[];state.confirmReset=false;persist();flash("統計已全部清空");render();}
}
function onClick(e){var el=e.target.closest?e.target.closest("[data-action]"):null;if(el)handle(el.getAttribute("data-action"),el);}
root.addEventListener("click",onClick);navEl.addEventListener("click",onClick);overlay.addEventListener("click",onClick);
render();
</script>
</body>
</html>
