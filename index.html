<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="排勤務板" />
<meta name="theme-color" content="#2A4634" />
<title>261 排勤務板</title>
<style>
  :root{--bg:#F1F3EE;--surface:#fff;--ink:#20261E;--sub:#6C7268;--line:#E3E5DC;--green:#3B6147;--green-deep:#2A4634;--green-soft:#E9EFE8;--brass:#A9793F;--brass-soft:#F5ECDB;--amber:#9A6B14;--amber-soft:#F7EFDB;--red:#B0453C;--red-soft:#F6E5E2;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
  body{font-family:system-ui,-apple-system,"Noto Sans TC","PingFang TC",sans-serif;color:var(--ink);}
  button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  input,textarea{font:inherit;}
  svg{display:block;}
  .wrap{max-width:600px;margin:0 auto;padding:16px 14px 96px;}
  .btn{transition:transform .12s ease,background .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .btn:active{transform:translateY(1px) scale(.985);}
  .tap:active{transform:scale(.96);}
  *:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
  .backdrop{position:fixed;inset:0;background:rgba(20,30,22,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .2s ease;}
  .sheet{width:100%;max-width:600px;background:var(--surface);border-radius:20px 20px 0 0;padding:0 14px 22px;box-shadow:0 -8px 30px rgba(0,0,0,.18);animation:slide .28s cubic-bezier(.2,.8,.2,1);}
  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:var(--green-deep);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88vw;text-align:center;display:none;}
  .toast.show{display:block;animation:fade .25s ease;}
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:saturate(1.1) blur(8px);border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;border:none;background:transparent;padding:11px 0 13px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11.5px;font-weight:700;color:var(--sub);}
  .nav button.on{color:var(--green-deep);}
  @keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<div id="overlay"></div>
<div id="toast" class="toast"></div>
<div id="nav" class="nav"></div>

<script src="core.js?v=45"></script>
<script>
"use strict";
/* ---------- 渲染 ---------- */
var root=document.getElementById("root"),navEl=document.getElementById("nav");
function render(){
  refreshHist();
  var h=header();
  if(state.page==="board"){
    if(state.gongban.loaded&&state.boardOpen){
      // 解析後由上到下：閱讀/編輯＋今天/明天小丸 → 閱讀 banner → 解析排班公版 → 解析行動準則 → 其餘照舊
      h+=boardTabs()+rescueBar();
      var ro=(state.boardMode==="view");
      if(ro)h+='<div style="margin-top:12px;display:flex;align-items:center;gap:7px;background:'+C.brassSoft+';border:1px solid '+C.brass+';border-radius:12px;padding:12px 14px;color:'+C.amber+';font-weight:700;font-size:12.5px;line-height:1.5;">'+icon("eye",15,C.brass)+' 閱讀模式：可看不可改，點上面鉛筆切換編輯</div>';
      syncAvail();
      h+=pasteCard()+schedCard()+availCard()+tlBoardToggle();
      h+=(state.boardView==="time")?boardTimeline():(mealsRow()+fencaRow()+dutyList());
      h+=extraCard(curDate());
      if(!state.readOnly){h+=boardActions();if(state.showPreview)h+=previewCard();h+=commitBtn();}
    }else{
      // 解析之前維持不變：貼公版的地方在上，下面是今天/明天＋可縮合的其他日期
      h+=pasteCard()+boardTabs()+rescueBar();
    }
  }
  else if(state.page==="guard"){h+=guardPage();}
  else if(state.page==="day"){h+=dayPage();}
  else{h+=statsPage();}
  root.innerHTML=h;
  navEl.innerHTML='<button data-action="go-board" class="'+(state.page==="board"?"on":"")+'">'+icon("board",20)+'排班</button><button data-action="go-guard" class="'+(state.page==="guard"?"on":"")+'">'+icon("shield",20)+'站哨</button><button data-action="go-day" class="'+(state.page==="day"?"on":"")+'">'+icon("calendar",20)+'行程</button><button data-action="go-stats" class="'+(state.page==="stats"?"on":"")+'">'+icon("chart",20)+'統計</button>';
  if(focusEl){var el=root.querySelector('[data-input="'+focusEl+'"]');if(el)el.focus();focusEl=null;}
}
root.addEventListener("input",onInput);overlay.addEventListener("input",onInput);

root.addEventListener("click",onClick);navEl.addEventListener("click",onClick);overlay.addEventListener("click",onClick);
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible")pullSync();});
syncAvail();   // 開 App 先依照排休紀錄還原「今日出勤」
render();
if(state.syncUrl){state.syncStatus="sync";pullSync();startPoll();}
fixMealTimes()&&render();
setInterval(function(){if(state.sheet||state.confirmDelDay)return;if(state.page==="day"){var cp=currentPlan();if(cp&&cp.plan&&cp.plan.date===todayLabel())render();}else if(state.page==="board"&&state.boardView==="time"&&state.gongban.loaded&&state.boardOpen&&curDate().replace(/[（(].*$/,"")===todayLabel())render();},60000);
</script>
</body>
</html>
