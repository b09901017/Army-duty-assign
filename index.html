function toMin(t){t=(t||"").replace(/[^0-9]/g,"");if(t.length<3)return null;t=t.slice(0,4);while(t.length<4)t="0"+t;var h=parseInt(t.slice(0,2),10),m=parseInt(t.slice(2,4),10);if(isNaN(h)||isNaN(m))return null;return h*60+m;}

function parseSched(text){

      cur={id:"s"+items.length,time:range.replace(/[^0-9]/g,"").slice(0,4),range:range,text:rest,min:toMin(range)};
      items.push(cur);return;
    }
    if(/\u884c\u52d5\u6e96\u64da|\u884c\u52d5\u6e96\u5247/.test(t)){if(!title)title=t;return;}
    var clean=t.replace(/^[\ud83d\udd39\ud83d\udd3a\ud83d\udd38\ud83d\udd37\ud83d\udd35]\s*/,"").replace(/\uFFFD/g,"").trim();
    if(cur&&!cur.text){cur.text=clean;}

    else{items.push({id:"s"+items.length,time:"",range:"",text:clean,min:null});cur=null;}
  });
  return {items:items,title:title};
}

  }
  for(var dt in state.boards){var b=state.boards[dt];if(!b)continue;
    var its=((b.schedule&&b.schedule.items)?b.schedule.items:[]).filter(function(it){return it.time;});
    fixList(b.duties,its);
  }
  fixList(state.duties,schedTimed());
  if(changed)persistLocal();   // еҸӘдҝ®жң¬ж©ҹпјҢдёҚдё»еӢ•дёҠеӮіпјҲйҒҝе…ҚдҪҝз”ЁиҖ…д»ҖйәјйғҪжІ’еҒҡе°ұжҺЁйӣІз«Ҝпјү
  return changed;
}
syncAvail();   // й–Ӣ App е…Ҳдҫқз…§жҺ’дј‘зҙҖйҢ„йӮ„еҺҹгҖҢд»Ҡж—ҘеҮәеӢӨгҖҚ
render();
if(state.syncUrl){state.syncStatus="sync";pullSync();startPoll();}
fixMealTimes()&&render();
setInterval(function(){if(state.sheet||state.confirmDelDay)return;if(state.page==="day"){var cp=currentPlan();if(cp&&cp.plan&&cp.plan.date===todayLabel())render();}else if(state.page==="board"&&state.boardView==="time"&&state.gongban.loaded&&state.boardOpen&&curDate().replace(/[пјҲ(].*$/,"")===todayLabel())render();},60000);
</script>
