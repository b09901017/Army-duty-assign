<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="排勤務板" />
<meta name="theme-color" content="#2A4634" />
<title>261 排勤務板</title>
<style>
  html,body{margin:0;padding:0;background:#F1F3EE;-webkit-text-size-adjust:100%;}
  #root{min-height:100vh;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ---------- 名冊（261梯，代號=本名） ---------- */
const PEOPLE = [
  { id: 1, code: "01", name: "李愷宸" },
  { id: 2, code: "02", name: "江偉綸" },
  { id: 3, code: "03", name: "陳柏翰" },
  { id: 4, code: "04", name: "鄧旭辰" },
  { id: 5, code: "05", name: "廖翊滕" },
  { id: 6, code: "06", name: "陳俊穎" },
  { id: 7, code: "07", name: "林柏宇" },
  { id: 8, code: "08", name: "林崇浩" },
];
const PERIODS = [
  { key: "AM", label: "上午", meal: "早打" },
  { key: "NOON", label: "午", meal: "午打" },
  { key: "PM", label: "晚", meal: "晚打" },
];
const C = {
  bg: "#F1F3EE", surface: "#FFFFFF", ink: "#20261E", sub: "#6C7268", line: "#E3E5DC",
  green: "#3B6147", greenDeep: "#2A4634", greenSoft: "#E9EFE8",
  brass: "#A9793F", brassSoft: "#F5ECDB", amber: "#9A6B14", amberSoft: "#F7EFDB",
  red: "#B0453C", redSoft: "#F6E5E2",
};
const STORE_KEY = "duty-board-v1";

/* ---------- 內建 SVG 圖示 ---------- */
const S = (p) => <svg width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke={p.color||"currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p.children}</svg>;
const Plus = (p) => <S {...p}><path d="M12 5v14"/><path d="M5 12h14"/></S>;
const Minus = (p) => <S {...p}><path d="M5 12h14"/></S>;
const X = (p) => <S {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></S>;
const Check = (p) => <S {...p}><path d="M20 6 9 17l-5-5"/></S>;
const RotateCcw = (p) => <S {...p}><path d="M3 12a9 9 0 1 0 9-9 9.7 9.7 0 0 0-6.7 2.7L3 8"/><path d="M3 3v5h5"/></S>;
const Copy = (p) => <S {...p}><rect x="8" y="8" width="14" height="14" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></S>;
const Trash2 = (p) => <S {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M10 11v6"/><path d="M14 11v6"/></S>;
const Wand2 = (p) => <S {...p}><path d="M4 20 14 10"/><path d="m17 3 1 2.5L20.5 6.5 18 7.5 17 10l-1-2.5L13.5 6.5 16 5.5z"/></S>;
const Settings2 = (p) => <S {...p}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></S>;
const AlertTriangle = (p) => <S {...p}><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></S>;

const freshMeals = () =>
  PERIODS.map((p) => ({ id: "m-" + p.key, name: p.meal, period: p.key, slots: 1, assigned: [], allTogether: false, fixed: true }));

const CSS = `
.db-btn{transition:transform .12s ease,background .2s ease,box-shadow .2s ease,border-color .2s ease;-webkit-tap-highlight-color:transparent;}
.db-btn:active{transform:translateY(1px) scale(.985);}
.db-tag{transition:background .15s ease,color .15s ease,border-color .15s ease,transform .12s ease;-webkit-tap-highlight-color:transparent;}
.db-tag:active{transform:scale(.96);}
.db-row{transition:background .15s ease;-webkit-tap-highlight-color:transparent;}
.db-back{animation:dbfade .2s ease;}
.db-sheet{animation:dbslide .28s cubic-bezier(.2,.8,.2,1);}
.db-in{animation:dbfade .25s ease;}
@keyframes dbslide{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes dbfade{from{opacity:0}to{opacity:1}}
*:focus-visible{outline:2px solid ${C.brass};outline-offset:2px;}
input{font:inherit;}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
`;

function loadState() {
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return null;
}

function App() {
  const [names, setNames] = useState(() => {
    const s = loadState(); const base = Object.fromEntries(PEOPLE.map((p) => [p.id, p.name]));
    return s && s.names ? { ...base, ...s.names } : base;
  });
  const [counts, setCounts] = useState(() => {
    const s = loadState(); const base = Object.fromEntries(PEOPLE.map((p) => [p.id, 0]));
    return s && s.counts ? { ...base, ...s.counts } : base;
  });
  const [available, setAvailable] = useState(() => Object.fromEntries(PEOPLE.map((p) => [p.id, true])));
  const [duties, setDuties] = useState(freshMeals);
  const [picker, setPicker] = useState(null);
  const [tab, setTab] = useState("simpu");
  const [panel, setPanel] = useState(false);
  const [toast, setToast] = useState("");
  const [confirmReset, setConfirmReset] = useState(false);
  const [add, setAdd] = useState({ open: false, name: "", period: "AM", slots: 1, allTogether: false });
  const toastT = useRef(null);

  useEffect(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify({ names, counts })); } catch (e) {}
  }, [names, counts]);

  const flash = (m) => { setToast(m); clearTimeout(toastT.current); toastT.current = setTimeout(() => setToast(""), 2200); };
  const codeOf = (id) => PEOPLE.find((p) => p.id === id).code;

  const toggleAssign = (dutyId, pid) =>
    setDuties((prev) => prev.map((d) => {
      if (d.id !== dutyId) return d;
      const has = d.assigned.includes(pid);
      return { ...d, assigned: has ? d.assigned.filter((x) => x !== pid) : [...d.assigned, pid] };
    }));
  const removeFromDuty = (dutyId, pid) =>
    setDuties((prev) => prev.map((d) => (d.id === dutyId ? { ...d, assigned: d.assigned.filter((x) => x !== pid) } : d)));

  const autoAssign = () =>
    setDuties((prev) => {
      const work = { ...counts };
      prev.forEach((d) => { if (!d.allTogether) d.assigned.forEach((pid) => (work[pid] = (work[pid] || 0) + 1)); });
      const pset = { AM: new Set(), NOON: new Set(), PM: new Set() };
      prev.forEach((d) => d.assigned.forEach((pid) => pset[d.period].add(pid)));
      const avail = PEOPLE.filter((p) => available[p.id]);
      let short = false;
      const next = prev.map((d) => {
        if (d.allTogether) return d;
        const need = d.slots - d.assigned.length;
        if (need <= 0) return d;
        const assigned = [...d.assigned];
        for (let i = 0; i < need; i++) {
          const cand = avail.filter((p) => !assigned.includes(p.id) && !pset[d.period].has(p.id));
          if (!cand.length) { short = true; break; }
          cand.sort((a, b) => (work[a.id] || 0) - (work[b.id] || 0) || a.id - b.id);
          const pick = cand[0];
          assigned.push(pick.id); work[pick.id] = (work[pick.id] || 0) + 1; pset[d.period].add(pick.id);
        }
        return { ...d, assigned };
      });
      flash(short ? "已分配，但有勤務人手不足" : "已依歷史次數公平分配");
      return next;
    });

  const clearToday = () => setDuties((prev) => prev.map((d) => ({ ...d, assigned: [] })));

  const commit = () => {
    const delta = {};
    duties.forEach((d) => { if (!d.allTogether) d.assigned.forEach((pid) => (delta[pid] = (delta[pid] || 0) + 1)); });
    if (!Object.keys(delta).length) { flash("目前沒有可計入的分配"); return; }
    setCounts((prev) => { const n = { ...prev }; Object.keys(delta).forEach((k) => (n[k] = (n[k] || 0) + delta[k])); return n; });
    setDuties(freshMeals());
    setAvailable(Object.fromEntries(PEOPLE.map((p) => [p.id, true])));
    setAdd({ open: false, name: "", period: "AM", slots: 1, allTogether: false });
    flash("已計入統計，今日已清空");
  };

  const addDuty = () => {
    const name = add.name.trim();
    if (!name) { flash("先幫勤務取個名字"); return; }
    setDuties((prev) => [...prev, { id: "c-" + Date.now(), name, period: add.period, slots: add.allTogether ? 0 : Math.max(1, add.slots), assigned: [], allTogether: add.allTogether, fixed: false }]);
    setAdd({ open: false, name: "", period: "AM", slots: 1, allTogether: false });
  };

  const conflict = {};
  PERIODS.forEach((p) => {
    const seen = {};
    duties.filter((d) => d.period === p.key).forEach((d) => d.assigned.forEach((pid) => (seen[pid] = (seen[pid] || 0) + 1)));
    Object.keys(seen).forEach((pid) => { if (seen[pid] > 1) conflict[p.key + ":" + pid] = true; });
  });
  const conflictIdsInPeriod = (period) => new Set(Object.keys(conflict).filter((k) => k.startsWith(period + ":")).map((k) => +k.split(":")[1]));

  const buildSimpu = () => {
    const out = [];
    PERIODS.forEach((p) => {
      const ds = duties.filter((d) => d.period === p.key && (d.allTogether || d.assigned.length));
      if (!ds.length) return;
      out.push(p.label);
      ds.forEach((d) => { const label = d.fixed ? "打飯" : d.name; out.push(d.allTogether ? `${label} 八人一起` : `${label} ${d.assigned.map(codeOf).join(" ")}`); });
      out.push("");
    });
    return out.join("\n").trim();
  };
  const buildRoster = () => {
    const out = [];
    PERIODS.forEach((p) => {
      const ds = duties.filter((d) => d.period === p.key && (d.allTogether || d.assigned.length));
      if (!ds.length) return;
      out.push(`【${p.label}】`);
      ds.forEach((d) => out.push(`${d.name}：${d.allTogether ? "八人一起（261）" : d.assigned.map((id) => names[id]).join("、")}`));
      out.push("");
    });
    return out.join("\n").trim() || "還沒有分配";
  };
  const copy = (text) => {
    if (!text) return;
    try { navigator.clipboard.writeText(text).then(() => flash("已複製"), () => flash("複製失敗，請長按框內文字選取")); }
    catch { flash("複製失敗，請長按框內文字選取"); }
  };

  const NumBadge = ({ code, size = 26, tone = "green" }) => (
    <span style={{ width: size, height: size, borderRadius: 8, display: "inline-flex", alignItems: "center", justifyContent: "center", background: tone === "green" ? C.greenDeep : C.line, color: tone === "green" ? "#fff" : C.sub, fontSize: 12, fontWeight: 700, fontVariantNumeric: "tabular-nums", flexShrink: 0, letterSpacing: 0.5 }}>{code}</span>
  );

  const nextUpId = (() => {
    const avail = PEOPLE.filter((p) => available[p.id]).sort((a, b) => (counts[a.id] || 0) - (counts[b.id] || 0) || a.id - b.id);
    return avail.length ? avail[0].id : null;
  })();

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.ink, fontFamily: "system-ui,-apple-system,'Noto Sans TC',sans-serif" }}>
      <style>{CSS}</style>
      <div style={{ maxWidth: 560, margin: "0 auto", padding: "18px 14px 120px" }}>

        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 38, height: 38, borderRadius: 10, background: C.greenDeep, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 15, letterSpacing: 0.5 }}>261</div>
            <div>
              <div style={{ fontSize: 19, fontWeight: 800, letterSpacing: 0.5 }}>排勤務板</div>
              <div style={{ fontSize: 12, color: C.sub }}>{new Date().toLocaleDateString("zh-TW", { month: "2-digit", day: "2-digit", weekday: "short" })} · 8 員</div>
            </div>
          </div>
          <button className="db-btn" onClick={() => setPanel((v) => !v)} style={{ width: 40, height: 40, borderRadius: 10, border: `1px solid ${C.line}`, background: panel ? C.greenSoft : C.surface, color: C.green, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}><Settings2 size={18} /></button>
        </div>

        <Card>
          <Label>今日出勤 · 點一下切換</Label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 10 }}>
            {PEOPLE.map((p) => {
              const on = available[p.id];
              return (
                <button key={p.id} className="db-tag" onClick={() => setAvailable((a) => ({ ...a, [p.id]: !a[p.id] }))}
                  style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 10px 6px 6px", borderRadius: 999, border: `1px solid ${on ? C.green : C.line}`, background: on ? C.greenSoft : C.surface, color: on ? C.greenDeep : C.sub, cursor: "pointer", opacity: on ? 1 : 0.62 }}>
                  <NumBadge code={p.code} size={22} tone={on ? "green" : "mute"} />
                  <span style={{ fontSize: 13, fontWeight: 600, textDecoration: on ? "none" : "line-through" }}>{names[p.id]}</span>
                </button>
              );
            })}
          </div>
          <div style={{ fontSize: 11.5, color: C.sub, marginTop: 9 }}>劃掉的人＝補休／站哨，自動分配不會排到。</div>
        </Card>

        {PERIODS.map((p) => {
          const ds = duties.filter((d) => d.period === p.key);
          const conf = conflictIdsInPeriod(p.key);
          return (
            <div key={p.key} style={{ marginTop: 18 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "0 4px 8px" }}>
                <span style={{ fontSize: 13, fontWeight: 800, color: C.green, letterSpacing: 1 }}>{p.label}</span>
                <div style={{ flex: 1, height: 1, background: C.line }} />
              </div>
              {ds.map((d) => <DutyCard key={d.id} d={d} conf={conf} />)}
            </div>
          );
        })}

        {!add.open ? (
          <button className="db-btn" onClick={() => setAdd((a) => ({ ...a, open: true }))} style={{ width: "100%", marginTop: 14, padding: 13, borderRadius: 14, border: `1.5px dashed ${C.green}`, background: "transparent", color: C.green, fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, cursor: "pointer" }}><Plus size={17} /> 新增勤務</button>
        ) : (
          <Card style={{ marginTop: 14 }}>
            <div className="db-in">
              <Label>新增勤務</Label>
              <input autoFocus value={add.name} onChange={(e) => setAdd((a) => ({ ...a, name: e.target.value }))} placeholder="勤務名稱（例：營部馬路、打冰桶、垃圾間）" style={{ width: "100%", boxSizing: "border-box", marginTop: 10, padding: "11px 12px", borderRadius: 10, border: `1px solid ${C.line}`, background: C.bg, fontSize: 14, outline: "none" }} />
              <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                {PERIODS.map((p) => (
                  <button key={p.key} className="db-btn" onClick={() => setAdd((a) => ({ ...a, period: p.key }))} style={{ flex: 1, padding: "9px 0", borderRadius: 9, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1px solid ${add.period === p.key ? C.green : C.line}`, background: add.period === p.key ? C.greenSoft : C.surface, color: add.period === p.key ? C.greenDeep : C.sub }}>{p.label}</button>
                ))}
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 12 }}>
                <button className="db-btn" onClick={() => setAdd((a) => ({ ...a, allTogether: !a.allTogether }))} style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 10px", borderRadius: 9, border: `1px solid ${add.allTogether ? C.green : C.line}`, background: add.allTogether ? C.greenSoft : C.surface, color: add.allTogether ? C.greenDeep : C.sub, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                  <span style={{ width: 16, height: 16, borderRadius: 5, border: `1.5px solid ${add.allTogether ? C.green : C.sub}`, background: add.allTogether ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>{add.allTogether && <Check size={11} color="#fff" />}</span>
                  八人一起（寫261）
                </button>
                {!add.allTogether && (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 13, color: C.sub }}>人數</span>
                    <Stepper value={add.slots} set={(v) => setAdd((a) => ({ ...a, slots: v }))} />
                  </div>
                )}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button className="db-btn" onClick={() => setAdd({ open: false, name: "", period: "AM", slots: 1, allTogether: false })} style={{ flex: 1, padding: 11, borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.sub, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>取消</button>
                <button className="db-btn" onClick={addDuty} style={{ flex: 2, padding: 11, borderRadius: 10, border: "none", background: C.green, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>加入勤務</button>
              </div>
            </div>
          </Card>
        )}

        <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
          <button className="db-btn" onClick={autoAssign} style={{ flex: 2, padding: 14, borderRadius: 14, border: "none", background: C.greenDeep, color: "#fff", fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, cursor: "pointer", boxShadow: "0 6px 16px rgba(42,70,52,.22)" }}><Wand2 size={18} /> 自動公平分配</button>
          <button className="db-btn" onClick={clearToday} style={{ flex: 1, padding: 14, borderRadius: 14, border: `1px solid ${C.line}`, background: C.surface, color: C.sub, fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, cursor: "pointer" }}><RotateCcw size={16} /> 清除</button>
        </div>

        <Card style={{ marginTop: 18 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <Label>輸出</Label>
            <div style={{ display: "flex", background: C.bg, borderRadius: 9, padding: 3 }}>
              {[["simpu", "簡打"], ["roster", "名單"]].map(([k, l]) => (
                <button key={k} className="db-btn" onClick={() => setTab(k)} style={{ padding: "6px 14px", borderRadius: 7, fontSize: 13, fontWeight: 700, border: "none", cursor: "pointer", background: tab === k ? C.surface : "transparent", color: tab === k ? C.greenDeep : C.sub, boxShadow: tab === k ? "0 1px 3px rgba(0,0,0,.08)" : "none" }}>{l}</button>
              ))}
            </div>
          </div>
          <pre style={{ margin: "10px 0 0", padding: 14, borderRadius: 11, background: C.bg, border: `1px solid ${C.line}`, fontSize: 13.5, lineHeight: 1.7, color: C.ink, whiteSpace: "pre-wrap", wordBreak: "break-word", fontFamily: "ui-monospace,'SF Mono',Menlo,monospace", minHeight: 44 }}>
            {tab === "simpu" ? (buildSimpu() || "還沒有分配，先擺勤務並指派人員") : buildRoster()}
          </pre>
          <button className="db-btn" onClick={() => copy(tab === "simpu" ? buildSimpu() : buildRoster())} style={{ width: "100%", marginTop: 10, padding: 12, borderRadius: 11, border: "none", background: C.brass, color: "#fff", fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, cursor: "pointer" }}><Copy size={16} /> 複製{tab === "simpu" ? "簡打" : "名單"}</button>
          {tab === "simpu" && <div style={{ fontSize: 11.5, color: C.sub, marginTop: 9 }}>把「簡打」貼進 Claude 專案＋當天公版，就會填出整份傳班長的版本。</div>}
        </Card>

        <button className="db-btn" onClick={commit} style={{ width: "100%", marginTop: 12, padding: 14, borderRadius: 14, border: `1.5px solid ${C.green}`, background: C.greenSoft, color: C.greenDeep, fontWeight: 800, fontSize: 14.5, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, cursor: "pointer" }}><Check size={18} /> 完成並計入統計（清空今日）</button>

        {panel && (
          <Card style={{ marginTop: 18 }}>
            <div className="db-in">
              <Label>累積統計 · 次數少的優先輪</Label>
              <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 2 }}>
                {[...PEOPLE].sort((a, b) => (counts[a.id] || 0) - (counts[b.id] || 0) || a.id - b.id).map((p) => {
                  const c = counts[p.id] || 0;
                  const max = Math.max(1, ...PEOPLE.map((x) => counts[x.id] || 0));
                  const up = p.id === nextUpId;
                  return (
                    <div key={p.id} className="db-row" style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 8px", borderRadius: 9, background: up ? C.brassSoft : "transparent" }}>
                      <NumBadge code={p.code} size={24} />
                      <input value={names[p.id]} onChange={(e) => setNames((n) => ({ ...n, [p.id]: e.target.value }))} style={{ flex: "0 0 auto", width: 74, border: "none", background: "transparent", fontSize: 14, fontWeight: 600, color: C.ink, outline: "none", padding: 0 }} />
                      <div style={{ flex: 1, height: 7, borderRadius: 4, background: C.line, overflow: "hidden" }}><div style={{ width: `${(c / max) * 100}%`, height: "100%", background: C.green, borderRadius: 4, transition: "width .3s ease" }} /></div>
                      {up && <span style={{ fontSize: 10.5, fontWeight: 800, color: C.brass }}>接下來</span>}
                      <span style={{ width: 26, textAlign: "right", fontSize: 14, fontWeight: 800, fontVariantNumeric: "tabular-nums", color: C.greenDeep }}>{c}</span>
                    </div>
                  );
                })}
              </div>
              <div style={{ fontSize: 11.5, color: C.sub, margin: "10px 2px 0" }}>名字可直接點開修改。數字＝累積被排到的次數，關掉重開都記得。</div>
              {!confirmReset ? (
                <button className="db-btn" onClick={() => setConfirmReset(true)} style={{ width: "100%", marginTop: 12, padding: 11, borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.red, fontWeight: 700, fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, cursor: "pointer" }}><RotateCcw size={15} /> 重設所有統計歸零</button>
              ) : (
                <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                  <button className="db-btn" onClick={() => setConfirmReset(false)} style={{ flex: 1, padding: 11, borderRadius: 10, border: `1px solid ${C.line}`, background: C.surface, color: C.sub, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>取消</button>
                  <button className="db-btn" onClick={() => { setCounts(Object.fromEntries(PEOPLE.map((p) => [p.id, 0]))); setConfirmReset(false); flash("統計已歸零"); }} style={{ flex: 1, padding: 11, borderRadius: 10, border: "none", background: C.red, color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>確定歸零</button>
                </div>
              )}
            </div>
          </Card>
        )}
      </div>

      {picker && (() => {
        const d = duties.find((x) => x.id === picker);
        if (!d) return null;
        const over = d.assigned.length > d.slots;
        return (
          <div className="db-back" onClick={() => setPicker(null)} style={{ position: "fixed", inset: 0, background: "rgba(20,30,22,.42)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }}>
            <div className="db-sheet" onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 560, background: C.surface, borderRadius: "20px 20px 0 0", padding: "8px 14px 22px", boxShadow: "0 -8px 30px rgba(0,0,0,.18)" }}>
              <div style={{ width: 40, height: 4, borderRadius: 2, background: C.line, margin: "6px auto 12px" }} />
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                <div style={{ fontSize: 16, fontWeight: 800 }}>{d.name}</div>
                <div style={{ fontSize: 12.5, color: over ? C.red : C.sub, fontWeight: 700 }}>{d.assigned.length} / {d.slots} 人</div>
              </div>
              <div style={{ fontSize: 12, color: C.sub, marginBottom: 8 }}>點名字加入或移除，次數少的排在前面。</div>
              <div style={{ maxHeight: "48vh", overflowY: "auto" }}>
                {[...PEOPLE].sort((a, b) => (counts[a.id] || 0) - (counts[b.id] || 0) || a.id - b.id).map((p) => {
                  const on = d.assigned.includes(p.id);
                  const off = !available[p.id];
                  return (
                    <button key={p.id} className="db-row" disabled={off} onClick={() => toggleAssign(d.id, p.id)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 11, padding: "11px 8px", borderRadius: 11, border: "none", background: on ? C.greenSoft : "transparent", cursor: off ? "not-allowed" : "pointer", opacity: off ? 0.45 : 1, textAlign: "left" }}>
                      <NumBadge code={p.code} size={30} tone={on ? "green" : "mute"} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{names[p.id]}</div>
                        <div style={{ fontSize: 11.5, color: C.sub }}>{off ? "今日補休／站哨" : `累積 ${counts[p.id] || 0} 次`}</div>
                      </div>
                      <span style={{ width: 24, height: 24, borderRadius: 999, border: `2px solid ${on ? C.green : C.line}`, background: on ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>{on && <Check size={14} color="#fff" />}</span>
                    </button>
                  );
                })}
              </div>
              <button className="db-btn" onClick={() => setPicker(null)} style={{ width: "100%", marginTop: 12, padding: 13, borderRadius: 12, border: "none", background: C.green, color: "#fff", fontWeight: 800, fontSize: 15, cursor: "pointer" }}>完成</button>
            </div>
          </div>
        );
      })()}

      {toast && <div className="db-in" style={{ position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", background: C.greenDeep, color: "#fff", padding: "10px 18px", borderRadius: 999, fontSize: 13.5, fontWeight: 600, zIndex: 60, boxShadow: "0 6px 20px rgba(0,0,0,.25)", maxWidth: "88vw", textAlign: "center" }}>{toast}</div>}
    </div>
  );

  function Card({ children, style }) { return <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 16, padding: 15, ...style }}>{children}</div>; }
  function Label({ children }) { return <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: 1, color: C.sub }}>{children}</div>; }
  function Stepper({ value, set }) {
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 2, border: `1px solid ${C.line}`, borderRadius: 9, padding: 2 }}>
        <button className="db-btn" onClick={() => set(Math.max(1, value - 1))} style={{ width: 30, height: 30, borderRadius: 7, border: "none", background: C.bg, color: C.green, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}><Minus size={15} /></button>
        <span style={{ width: 26, textAlign: "center", fontSize: 15, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{value}</span>
        <button className="db-btn" onClick={() => set(Math.min(8, value + 1))} style={{ width: 30, height: 30, borderRadius: 7, border: "none", background: C.bg, color: C.green, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}><Plus size={15} /></button>
      </div>
    );
  }
  function DutyCard({ d, conf }) {
    const under = !d.allTogether && d.assigned.length < d.slots;
    const over = !d.allTogether && d.assigned.length > d.slots;
    const statusColor = over ? C.red : under ? C.amber : C.green;
    const statusBg = over ? C.redSoft : under ? C.amberSoft : C.greenSoft;
    return (
      <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: 13, marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0 }}>
            <span style={{ fontSize: 15, fontWeight: 800, color: C.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{d.name}</span>
            {d.fixed && <span style={{ fontSize: 10.5, fontWeight: 700, color: C.brass, background: C.brassSoft, padding: "2px 7px", borderRadius: 6, flexShrink: 0 }}>固定</span>}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
            {!d.allTogether && <span style={{ fontSize: 11.5, fontWeight: 800, color: statusColor, background: statusBg, padding: "3px 8px", borderRadius: 7 }}>{d.assigned.length}/{d.slots}</span>}
            {d.allTogether && <span style={{ fontSize: 11.5, fontWeight: 800, color: C.green, background: C.greenSoft, padding: "3px 8px", borderRadius: 7 }}>全班261</span>}
            {!d.fixed && <button className="db-btn" onClick={() => setDuties((prev) => prev.filter((x) => x.id !== d.id))} style={{ width: 28, height: 28, borderRadius: 7, border: "none", background: "transparent", color: C.sub, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}><Trash2 size={15} /></button>}
          </div>
        </div>
        {!d.allTogether && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
            {d.assigned.map((pid) => {
              const bad = conf.has(pid);
              return (
                <span key={pid} className="db-tag" style={{ display: "flex", alignItems: "center", gap: 5, padding: "5px 5px 5px 8px", borderRadius: 999, background: bad ? C.redSoft : C.greenSoft, border: `1px solid ${bad ? C.red : "transparent"}` }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: bad ? C.red : C.greenDeep }}>{names[pid]}</span>
                  <button onClick={() => removeFromDuty(d.id, pid)} style={{ width: 18, height: 18, borderRadius: 999, border: "none", background: "rgba(0,0,0,.06)", color: C.sub, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", padding: 0 }}><X size={11} /></button>
                </span>
              );
            })}
            <button className="db-btn" onClick={() => setPicker(d.id)} style={{ display: "flex", alignItems: "center", gap: 4, padding: "6px 12px", borderRadius: 999, border: `1px dashed ${C.green}`, background: "transparent", color: C.green, fontSize: 13, fontWeight: 700, cursor: "pointer" }}><Plus size={14} /> 指派</button>
          </div>
        )}
        {!d.allTogether && d.assigned.some((pid) => conf.has(pid)) && (
          <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 8, fontSize: 11.5, color: C.red, fontWeight: 600 }}><AlertTriangle size={13} /> 標紅的人這個時段被排了兩件事</div>
        )}
      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
