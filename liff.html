<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="排班" />
<meta name="theme-color" content="#2A4634" />
<title>261 排班（LINE）</title>
<style>
  :root{--bg:#F1F3EE;--surface:#fff;--ink:#20261E;--sub:#6C7268;--line:#E3E5DC;--green:#3B6147;--green-deep:#2A4634;--green-soft:#E9EFE8;--brass:#A9793F;--brass-soft:#F5ECDB;--amber:#9A6B14;--amber-soft:#F7EFDB;--red:#B0453C;--red-soft:#F6E5E2;}
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);-webkit-text-size-adjust:100%;}
  body{font-family:system-ui,-apple-system,"Noto Sans TC","PingFang TC",sans-serif;color:var(--ink);}
  button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  input,textarea{font:inherit;}
  svg{display:block;}
  .wrap{max-width:600px;margin:0 auto;padding:16px 14px 108px;}
  .btn{transition:transform .12s ease,background .2s ease,box-shadow .2s ease,border-color .2s ease;}
  .btn:active{transform:translateY(1px) scale(.985);}
  .tap:active{transform:scale(.96);}
  *:focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
  .backdrop{position:fixed;inset:0;background:rgba(20,30,22,.42);display:flex;align-items:flex-end;justify-content:center;z-index:50;animation:fade .2s ease;}
  .sheet{width:100%;max-width:600px;background:var(--surface);border-radius:20px 20px 0 0;padding:0 14px 22px;box-shadow:0 -8px 30px rgba(0,0,0,.18);animation:slide .28s cubic-bezier(.2,.8,.2,1);}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--green-deep);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.25);max-width:88vw;text-align:center;display:none;}
  .toast.show{display:block;animation:fade .25s ease;}
  .sendbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:saturate(1.1) blur(8px);border-top:1px solid var(--line);z-index:40;padding:10px 14px calc(10px + env(safe-area-inset-bottom));}
  .sendbar .inner{max-width:600px;margin:0 auto;}
  @keyframes slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<div id="overlay"></div>
<div id="toast" class="toast"></div>

<!-- LINE LIFF SDK -->
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<!-- 與主 App 共用同一套邏輯層（解析／分配／同步／統計／時間軸／面板／事件層） -->
<script src="core.js?v=46"></script>
<script>
"use strict";
/* ==========================================================================
   liff.html —— 給 LINE 用的精簡排班頁（共用 core.js）
   只保留：清單／時間軸兩檢視、解析、排人、上雲、計入統計、一顆「發送」。
   拿掉：貼上框、今日出勤、閱讀 banner 切換、日期小丸、複製/預覽那一排、底部 nav。
   ========================================================================== */

/* ---- M3 要填的設定（現在留空＝dev 模式，可用 ?raw= 或貼上框測試） ---- */
var LIFF_ID="2010783262-dYWN11ji";                 // LINE Developers 的 LIFF ID
var GONGBAN_FETCH_URL="https://script.google.com/macros/s/AKfycbzcBN2E7fMFTj3yAxHEHPOTVvKITv3O5hgVKkIvCxemg9WorkI8EmOKAnp-lwk-mi5v/exec";       // LINE webhook Apps Script 的 /exec（doGet?key= 回 {text:公版原文}）
var ALLOW_UIDS=["Uc41ec9d3f7cecb8470a9296c17cf775f"];   // 允許編輯的 LINE userId；要加其他人就用逗號分隔加進陣列
/* 雲端同步沿用 core.js 的 DEFAULT_SYNC_URL（跟主 App 同一份試算表）。 */

var root=document.getElementById("root");
var GUIDE=null;   // 行動準據暫存 {date,items,title,wd,raw}（liff-local，不同步）

/* 相對日期：今天/明天/昨天/M/D（用 core 的 todayLabel/addDaysMD/dnum） */
function relDay(md){md=String(md||"").replace(/[（(].*$/,"");var t=todayLabel();if(md===t)return "今天";if(md===addDaysMD(t,1))return "明天";if(md===addDaysMD(t,-1))return "昨天";return md;}
function isPastDate(md){md=String(md||"").replace(/[（(].*$/,"");return dnum(md)>0&&dnum(md)<dnum(todayLabel());}   // 昨天以前＝過去（覆蓋前要確認）

/* ---------- liff 專屬畫面片段 ---------- */
function liffHeader(){
  var dl=state.activeDate?(esc(state.activeDate)+(state.boards[state.activeDate]&&state.boards[state.activeDate].wd?("（"+esc(state.boards[state.activeDate].wd)+"）"):"")):"";
  var ro=state.readOnly?'<span style="margin-left:auto;display:flex;align-items:center;gap:4px;font-size:11px;font-weight:800;color:'+C.amber+';">'+icon("eye",12,C.amber)+'唯讀</span>':"";
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><div style="width:34px;height:34px;border-radius:10px;background:'+C.greenDeep+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;">261</div><div style="min-width:0;"><div style="font-size:17px;font-weight:800;">排班'+(dl?'　<span style="font-size:13px;color:'+C.sub+';font-weight:700;">'+dl+'</span>':"")+'</div><div style="font-size:11.5px;color:'+C.sub+';">解析→排人→發送給班長</div></div>'+ro+'</div>';
}
function liffSendBar(){
  var n=state.duties.filter(function(d){return !d.removed;}).length;
  if(state._confirmSend){   // 過去日期→上傳覆蓋前確認
    var pd=(state.activeDate||"").replace(/[（(].*$/,"");
    return '<div class="sendbar"><div class="inner"><div style="font-size:12.5px;font-weight:700;color:'+C.red+';margin-bottom:8px;line-height:1.5;">⚠️ 這是 '+esc(pd)+'（過去日期）的公版，發送會覆蓋雲端那天的排班／統計。確定嗎？</div><div style="display:flex;gap:8px;"><button class="btn" data-action="liff-send-cancel" style="flex:1;padding:13px;border-radius:12px;border:1px solid '+C.line+';background:'+C.surface+';color:'+C.sub+';font-weight:700;font-size:14px;">取消</button><button class="btn" data-action="liff-send-go" style="flex:2;padding:13px;border-radius:12px;border:none;background:'+C.red+';color:#fff;font-weight:800;font-size:15px;">確定發送</button></div></div></div>';
  }
  return '<div class="sendbar"><div class="inner"><button class="btn" data-action="liff-send" style="width:100%;padding:15px;border-radius:14px;border:none;background:'+C.greenDeep+';color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(42,70,52,.28);">'+icon("check",19,"#fff")+' 發送（'+n+' 項 · 計入統計並傳回聊天室）</button></div></div>';
}
function devPaste(){
  var isG=(state._type==="guide");
  return card(label("〔測試模式〕貼上"+(isG?"行動準據":"公版"))+'<div style="font-size:11.5px;color:'+C.sub+';margin-top:6px;line-height:1.6;">正式流程是從 LINE bot 帶入（?key=）。這個框只在非 LINE 環境出現，方便測解析。</div><textarea data-input="paste" placeholder="貼'+(isG?"行動準據":"公版")+'…" style="width:100%;height:140px;margin-top:10px;padding:12px;border-radius:10px;border:1px solid '+C.line+';background:'+C.bg+';font-size:13.5px;line-height:1.6;outline:none;resize:vertical;font-family:ui-monospace,Menlo,monospace;">'+esc(typeof pasteText!=="undefined"?pasteText:"")+'</textarea><button class="btn" data-action="liff-devparse" style="width:100%;margin-top:10px;padding:13px;border-radius:11px;border:none;background:'+C.greenDeep+';color:#fff;font-weight:800;font-size:15px;">解析'+(isG?"準據":"勤務")+'</button>');
}

/* ---------- 唯讀檢視模式（?type=view&view=A/B/C&date=）：給群組 carousel 點進來看 ---------- */
function viewHeader(md,v){
  var name=(v==="C")?"八人時段表":(v==="B")?"八人分工":"當天流程";
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><div style="width:34px;height:34px;border-radius:10px;background:'+C.greenDeep+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;">261</div><div style="min-width:0;"><div style="font-size:17px;font-weight:800;">'+esc(name)+'　<span style="font-size:13px;color:'+C.sub+';font-weight:700;">'+esc(md)+'</span></div><div style="font-size:11.5px;color:'+C.sub+';">看看就好，不會改到東西</div></div></div>';
}
function renderView(){
  var md=(state._viewDate||todayLabel()).replace(/[（(].*$/,""),v=state._view||"A";
  var head=viewHeader(md,v);
  var plan=null;try{plan=planForBoard(md);}catch(e){}
  if(!plan){root.innerHTML=head+card('<div style="text-align:center;color:'+C.sub+';font-size:13.5px;padding:30px 12px;line-height:1.7;">這天還沒有排班資料，<br>或還在從雲端載入…</div>');return;}
  var body;
  try{body=(v==="C")?(dayLegend()+modeC(plan)):(v==="B")?(dayLegend()+modeB(plan)):modeA(plan);}
  catch(e){body=card('<div style="color:'+C.red+';">畫面出錯：'+esc((e&&e.message)||String(e))+'</div>');}
  root.innerHTML=head+body;
}

/* ---------- liff 專屬 render（覆蓋 core 沒有的頁面組合；render 為每頁各自定義） ---------- */
function render(){
  if(state._mode==="view"){renderView();return;}     // 唯讀檢視（carousel 點進來）
  if(state._mode==="guide"){renderGuide();return;}   // 行動準據上傳模式
  refreshHist();
  var h=liffHeader();
  if(state._err){root.innerHTML=h+card('<div style="color:'+C.red+';font-weight:700;font-size:14px;">'+esc(state._err)+'</div>');return;}
  if(!state.gongban.loaded){
    root.innerHTML=h+(state._dev?devPaste():card('<div style="text-align:center;color:'+C.sub+';font-size:13.5px;padding:30px 12px;line-height:1.7;">載入公版中…</div>'));
    if(focusEl){var e0=root.querySelector('[data-input="'+focusEl+'"]');if(e0)e0.focus();focusEl=null;}
    return;
  }
  syncAvail();
  h+=tlBoardToggle();
  h+=(state.boardView==="time")?boardTimeline():(mealsRow()+fencaRow()+dutyList());
  if(!state.readOnly)h+=liffSendBar();
  root.innerHTML=h;
  if(focusEl){var el=root.querySelector('[data-input="'+focusEl+'"]');if(el)el.focus();focusEl=null;}
}

/* ---------- 載入公版：把 core 的 parse 流程包起來（不經 UI 貼上框） ---------- */
function applyGongban(text){
  text=String(text||"");
  var r=parseGongban(text);
  var pd=extractDate(text)||todayLabel();
  var pwm=text.match(/[（(]([一二三四五六日])[)）]/);
  saveBoard();
  state.gongban={raw:text,meta:r.meta,loaded:true};state.duties=r.duties;state.activeDate=pd;state.boardMode="edit";state.boardOpen=true;
  // 準則每天一份：這天以前貼過就沿用
  var exb=state.boards[pd],exs=exb&&exb.schedule;
  state.schedule=(exs&&exs.items&&exs.items.length)?{raw:exs.raw||"",items:exs.items,title:exs.title||"",loaded:true,date:exs.date||""}:{raw:"",items:[],title:"",loaded:false,date:""};
  autoTagTimes();
  var bd0=state.boards[pd]||{};bd0.wd=pwm?pwm[1]:(bd0.wd||"");state.boards[pd]=bd0;
  syncAvail();persistLocal();
  if(!r.duties.length)flash("沒抓到含 261 或打飯的勤務，確認公版格式");
  render();
}

/* ========== 行動準據上傳模式 ========== */
function applyGuide(text){
  text=String(text||"");
  var r=parseSched(text);
  var pd=extractDate(text)||todayLabel();
  var pwm=text.match(/[（(]([一二三四五六日])[)）]/);
  GUIDE={date:pd,items:r.items,title:r.title,wd:pwm?pwm[1]:"",raw:text};
  state._mode="guide";
  if(!r.items.length)flash("沒抓到時間點，確認是行動準據格式");
  render();
}
function guideHeader(){
  var lab=GUIDE?relDay(GUIDE.date):"";
  return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><div style="width:34px;height:34px;border-radius:10px;background:'+C.brass+';color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;">'+icon("clock",18,"#fff")+'</div><div style="min-width:0;"><div style="font-size:17px;font-weight:800;">行動準據'+(GUIDE?'　<span style="font-size:13px;color:'+C.sub+';font-weight:700;">'+esc(GUIDE.date)+(GUIDE.wd?("（"+esc(GUIDE.wd)+"）"):"")+'</span>':"")+'</div><div style="font-size:11.5px;color:'+C.sub+';">上傳雲端，用 App 打開就有這天的準據</div></div></div>';
}
function renderGuide(){
  var head=guideHeader();
  if(state._err){root.innerHTML=head+card('<div style="color:'+C.red+';font-weight:700;font-size:14px;">'+esc(state._err)+'</div>');return;}
  if(!GUIDE){root.innerHTML=head+(state._dev?devPaste():card('<div style="text-align:center;color:'+C.sub+';font-size:13.5px;padding:30px 12px;">載入準據中…</div>'));if(focusEl){var e0=root.querySelector('[data-input="'+focusEl+'"]');if(e0)e0.focus();focusEl=null;}return;}
  var timed=GUIDE.items.filter(function(it){return it.time;}).length;
  var rows=GUIDE.items.slice(0,40).map(function(it){
    return '<div style="display:flex;gap:10px;align-items:baseline;padding:5px 2px;border-bottom:1px solid '+C.line+';"><span style="flex:0 0 74px;font-variant-numeric:tabular-nums;font-weight:800;font-size:12.5px;color:'+(it.time?C.greenDeep:C.sub)+';">'+esc(it.time?fmtSpan(it.range):"—")+'</span><span style="flex:1;font-size:13px;color:'+C.ink+';line-height:1.5;">'+esc(it.text||"")+'</span></div>';
  }).join("");
  var preview=card(label("解析結果（"+timed+" 個時段）")+'<div style="margin-top:8px;max-height:46vh;overflow-y:auto;">'+rows+(GUIDE.items.length>40?'<div style="font-size:11.5px;color:'+C.sub+';padding:6px 2px;">…共 '+GUIDE.items.length+' 項</div>':"")+'</div>');
  var past=isPastDate(GUIDE.date);
  var warn=past?'<div style="background:'+C.redSoft+';border:1px solid '+C.red+';border-radius:11px;padding:10px 13px;margin-bottom:12px;font-size:12.5px;font-weight:700;color:'+C.red+';line-height:1.5;">⚠️ 這是 '+esc(GUIDE.date)+'（過去日期）的準據，班長可能傳錯日期。上傳會覆蓋雲端那天既有的準據，請確認。</div>':"";
  var h=head+warn+preview;
  if(!state.readOnly)h+=guideUploadBar(past);
  else h+='<div style="margin-top:14px;font-size:12.5px;color:'+C.amber+';font-weight:700;">你不在編輯名單，只能看不能上傳。</div>';
  root.innerHTML=h;
  if(focusEl){var el=root.querySelector('[data-input="'+focusEl+'"]');if(el)el.focus();focusEl=null;}
}
function guideUploadBar(past){
  if(state._uploaded)return '<div class="sendbar"><div class="inner"><div style="text-align:center;padding:13px;font-size:14.5px;font-weight:800;color:'+C.green+';">'+icon("check",18,C.green)+' 已上傳，用 App 打開 '+esc(GUIDE.date)+' 就有了</div></div></div>';
  if(state._confirmUpload){
    return '<div class="sendbar"><div class="inner"><div style="font-size:12.5px;font-weight:700;color:'+C.red+';margin-bottom:8px;">確定上傳 '+esc(GUIDE.date)+'（過去日期）並覆蓋雲端那天的準據？</div><div style="display:flex;gap:8px;"><button class="btn" data-action="liff-guide-cancel" style="flex:1;padding:13px;border-radius:12px;border:1px solid '+C.line+';background:'+C.surface+';color:'+C.sub+';font-weight:700;font-size:14px;">取消</button><button class="btn" data-action="liff-guide-upload-go" style="flex:2;padding:13px;border-radius:12px;border:none;background:'+C.red+';color:#fff;font-weight:800;font-size:15px;">確定上傳</button></div></div></div>';
  }
  return '<div class="sendbar"><div class="inner"><button class="btn" data-action="liff-guide-upload" style="width:100%;padding:15px;border-radius:14px;border:none;background:'+(past?C.red:C.brass)+';color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 16px rgba(169,121,63,.28);">'+icon("check",19,"#fff")+' 上傳 '+esc(GUIDE.date)+' 行動準據</button></div></div>';
}
function uploadGuide(force){
 try{
  if(state.readOnly){flash("你不在編輯名單，無法上傳");return;}
  var g=GUIDE;if(!g||!g.items.length){flash("沒有可上傳的準據");return;}
  var pd=g.date.replace(/[（(].*$/,"");
  if(isPastDate(pd)&&!force){state._confirmUpload=true;render();return;}   // 過去日期先確認
  // 資料安全：一定要 pull 過（拿到那天雲端最新的 board）才准 push，否則可能用空的覆蓋掉已排勤務
  if(!pulledOk){flash("讀取雲端中…請 2 秒後再按一次");pullSync();return;}
  var sched={raw:g.raw,items:g.items,title:g.title,loaded:!!g.items.length,date:g.date};
  var b=state.boards[pd];
  if(b){b.schedule=sched;if(g.wd&&!b.wd)b.wd=g.wd;b.ts=Date.now();}   // 只改 schedule 欄位，保留既有 duties/committed
  else{state.boards[pd]={raw:"",meta:[],duties:[],schedule:sched,committed:false,wd:g.wd||"",imported:false,ts:Date.now()};}
  if(state.activeDate===pd)state.schedule=sched;
  state._confirmUpload=false;state._uploaded=true;
  persistLocal();pushSync();
  flash("已上傳 "+pd+" 行動準據到雲端");
  render();
 }catch(err){flash("上傳出錯："+((err&&err.message)||String(err)));try{console.error("uploadGuide error:",err);}catch(_){}}
}

/* ---------- 發送：計入統計＋上雲＋傳回聊天室 ---------- */
function liffSend(){
 try{
  if(state.readOnly){flash("你不在編輯名單，無法發送");return;}
  if(!state.duties.filter(function(d){return !d.removed;}).length){flash("還沒有勤務可發送");return;}
  var pd=(state.activeDate||"").replace(/[（(].*$/,"");
  if(pd&&isPastDate(pd)&&!state._confirmSend){state._confirmSend=true;render();return;}   // 過去日期→覆蓋前確認
  state._confirmSend=false;
  commit();                       // core：計入統計（同天覆蓋只算一次）＋ savePlan/saveBoard ＋ persist 上雲
  var filled=buildFilled();
  // M5 之後：這裡也會把 filled/個人分工存進雲端 texts[日期]，給未來 bot 指令用
  // 註：不用 liff.isApiAvailable("sendMessages") 當門檻——某些 LIFF SDK 版本對這個字串會直接丟
  // "unexpected api name" 例外（而不是回傳 false），所以改成直接嘗試呼叫、失敗再退回複製。
  var inLine=false;try{inLine=!!(window.liff&&liff.isInClient&&liff.isInClient());}catch(e0){}
  if(window.liff&&liff.sendMessages&&inLine){
    flash("發送中…");
    try{
      liff.sendMessages([{type:"text",text:filled}]).then(function(){
        flash("已送出，回聊天室長按那則訊息即可轉傳");
        setTimeout(function(){try{if(liff.getContext&&liff.getContext()&&liff.getContext().type!=="external")liff.closeWindow();}catch(e){}},1300);
      }).catch(function(e){
        copyText(filled);
        flash("送出失敗："+((e&&(e.message||e.code||JSON.stringify(e)))||"未知")+"（已計入統計，改為複製）");
      });
    }catch(e2){
      // liff.sendMessages 本身同步丟例外（非 promise reject）時，上面的 .catch 接不到，這裡補上
      copyText(filled);
      flash("送出失敗（同步例外）："+((e2&&e2.message)||String(e2))+"（已計入統計，改為複製）");
    }
  }else{
    copyText(filled);
    flash(inLine?"（此裝置不支援直接傳送，已複製）已計入統計":"（非 LINE 環境）已計入並複製填好公版");
  }
 }catch(topErr){
   // 兜底：commit()/render()/buildFilled() 任何一步出例外都不再無聲卡住，直接顯示真正的錯誤訊息
   flash("發送流程出錯："+((topErr&&topErr.message)||String(topErr)));
   try{console.error("liffSend error:",topErr);}catch(_){}
 }
}

/* ---------- 事件：liff 專屬動作優先，其餘全交給 core 的 handle ---------- */
function liffClick(e){
  var el=e.target.closest?e.target.closest("[data-action]"):null;if(!el)return;
  var a=el.getAttribute("data-action");
  if(a==="liff-send"){liffSend();return;}
  if(a==="liff-send-go"){state._confirmSend=true;liffSend();return;}
  if(a==="liff-send-cancel"){state._confirmSend=false;render();return;}
  if(a==="liff-guide-upload"){uploadGuide(false);return;}
  if(a==="liff-guide-upload-go"){uploadGuide(true);return;}
  if(a==="liff-guide-cancel"){state._confirmUpload=false;render();return;}
  if(a==="liff-devparse"){var pt=(typeof pasteText!=="undefined"?pasteText:"");if(state._type==="guide")applyGuide(pt);else applyGongban(pt);return;}
  handle(a,el);   // pick / auto / tl-open / count-inc / set-time / af-* … 全部共用 core 事件層
}
root.addEventListener("click",liffClick);
overlay.addEventListener("click",liffClick);
root.addEventListener("input",onInput);
overlay.addEventListener("input",onInput);

/* ---------- 取原文：?raw=（測試用，直接帶原文） 或 ?key=（正式，跟 webhook 拿）；type=gongban|guide ---------- */
function dispatchText(text){ if(state._type==="guide")applyGuide(text); else applyGongban(text); }
function loadContent(key,raw,type){
  state._type=type||"gongban";
  if(raw){dispatchText(decodeURIComponent(raw));return;}
  if(key&&GONGBAN_FETCH_URL){
    fetch(GONGBAN_FETCH_URL+(GONGBAN_FETCH_URL.indexOf("?")>=0?"&":"?")+"key="+encodeURIComponent(key))
      .then(function(r){return r.text();})
      .then(function(t){var o=null;try{o=JSON.parse(t);}catch(e){}var text=(o&&o.text)||"";
        state._type=type||(o&&o.type)||"gongban";   // URL 沒帶 type 就用 webhook 回的 type
        if(text)dispatchText(text);else{state._err="雲端找不到這份資料（key 可能過期，請回聊天室重點按鈕）";render();}})
      .catch(function(){state._err="抓資料失敗，檢查網路後回聊天室重點按鈕";render();});
    return;
  }
  state._dev=true;render();   // 沒 key 沒 raw → 測試模式，顯示貼上框
}

/* 動態問 webhook「這個 userId 能不能編輯」（機器人開通的編輯者也能編） */
function fetchCanEdit(uid){
  if(!GONGBAN_FETCH_URL||!uid)return;
  fetch(GONGBAN_FETCH_URL+(GONGBAN_FETCH_URL.indexOf("?")>=0?"&":"?")+"canedit="+encodeURIComponent(uid))
    .then(function(r){return r.text();}).then(function(t){var o=null;try{o=JSON.parse(t);}catch(e){}
      if(o&&typeof o.edit==="boolean"){var ro=!o.edit;if(ro!==state.readOnly){state.readOnly=ro;render();}}})
    .catch(function(){});
}

/* ---------- 啟動 ---------- */
function boot(){
  var params={};(location.search||"").replace(/^\?/,"").split("&").forEach(function(kv){if(!kv)return;var p=kv.split("=");params[decodeURIComponent(p[0])]=decodeURIComponent((p[1]||"").replace(/\+/g," "));});
  var key=params.key||"",raw=params.raw||"",type=params.type||"";
  // 先連雲端（資料安全：pull 過才准 push）
  if(state.syncUrl){state.syncStatus="sync";pullSync();startPoll();}
  // 唯讀檢視模式（群組 carousel 點進來）：不用取原文、不用白名單，pull 回來就畫
  if(type==="view"){
    state._mode="view";state._view=(params.view||"A").toUpperCase();state._viewDate=(params.date||todayLabel()).replace(/[（(].*$/,"");state.readOnly=true;
    render();return;
  }
  if(LIFF_ID&&window.liff){
    liff.init({liffId:LIFF_ID}).then(function(){return liff.getProfile();}).then(function(p){
      state._uid=p.userId;
      var allowed=(!ALLOW_UIDS.length)||ALLOW_UIDS.indexOf(p.userId)>=0;   // 本機白名單（owner 一定通）先判定
      state.readOnly=!allowed;
      loadContent(key,raw,type);
      fetchCanEdit(p.userId);   // 再跟 webhook 動態確認（機器人開通的編輯者也能編）
    }).catch(function(){state.readOnly=false;loadContent(key,raw,type);});   // 外部瀏覽器等初始化失敗→當測試
  }else{
    state.readOnly=false;loadContent(key,raw,type);
  }
}
render();   // 先畫一次（載入中）
boot();
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible")pullSync();});
</script>
